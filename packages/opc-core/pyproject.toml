[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "opc-core"
version = "0.4.0"
description = "OpenClaw OPC - Core Business Logic Module"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [
    {name = "OpenClaw OPC Team"}
]
keywords = ["openclaw", "opc", "agent", "management"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "pydantic>=2.5.0",
    "opc-database>=0.4.0",
    "opc-openclaw>=0.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.25.0",
    "aiosqlite>=0.19.0",
    "respx>=0.20.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/opc_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
