version: '3.8'

# OpenClaw OPC - Production Deployment Configuration
# 
# Usage:
#   1. Copy .env.example to .env and configure
#   2. Run: docker-compose -f docker-compose.prod.yml up -d
#
# External Access (Experimental):
#   For Quick Tunnel (testing only):
#     cloudflared tunnel --url http://localhost:8080
#
#   For production, consider:
#     - Purchasing a domain and configuring formal Cloudflare Tunnel
#     - Using a server with public IP
#
# Documentation: docs/CLOUDFLARE_TUNNEL.md

services:
  # Core Service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opc-backend
    expose:
      - "8080"  # Only expose to internal network, no port binding
    volumes:
      - ./data:/app/data
    environment:
      # Database
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/opc.db}
      
      # Server Configuration
      - HOST=0.0.0.0
      - PORT=8080
      
      # Security (Production Hardening)
      # CORS origins should be set to your Cloudflare domains only
      - CORS_ORIGINS=${CORS_ORIGINS:-https://*.trycloudflare.com}
      
      # API Key Authentication - REQUIRED for external access
      - API_KEY_AUTH_ENABLED=${API_KEY_AUTH_ENABLED:-true}
      - API_KEY_SECRET=${API_KEY_SECRET}
      
      # Budget Configuration
      - TOKEN_RATE=${TOKEN_RATE:-100}
      - BUDGET_WARNING_THRESHOLD=${BUDGET_WARNING_THRESHOLD:-80}
      - BUDGET_FUSE_THRESHOLD=${BUDGET_FUSE_THRESHOLD:-100}
      
      # Task Configuration
      - TASK_TIMEOUT_MINUTES=${TASK_TIMEOUT_MINUTES:-30}
      - MAX_TASK_TIMEOUT_MINUTES=${MAX_TASK_TIMEOUT_MINUTES:-480}
      
      # Partner Configuration
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-30}
      - HEARTBEAT_TIMEOUT=${HEARTBEAT_TIMEOUT:-60}
      - AUTO_ASSIGN_STRATEGY=${AUTO_ASSIGN_STRATEGY:-budget}
      
      # Notification Configuration
      - ENABLE_NOTIFICATIONS=${ENABLE_NOTIFICATIONS:-true}
      - NOTIFICATION_RETENTION_DAYS=${NOTIFICATION_RETENTION_DAYS:-30}
      
      # Logging (Production)
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      
      # Development (Disabled in production)
      - RELOAD=false
      - SQL_ECHO=false
      
      # OpenClaw Integration
      - DEFAULT_PARTNER_ID=${DEFAULT_PARTNER_ID:-main}
    restart: unless-stopped
    networks:
      - opc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Web Dashboard (nginx)
  frontend:
    image: nginx:alpine
    container_name: opc-frontend
    expose:
      - "80"  # Only expose to internal network, no port binding
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - opc-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

  # Cloudflare Tunnel - Secure external access
  # ⚠️  WARNING: Quick Tunnel is for testing only, not stable for production
  # For external access, manually run: cloudflared tunnel --url http://localhost:8080
  # Or purchase a domain for formal tunnel setup
  # 
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: opc-tunnel
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #     - TUNNEL_EDGE_IP_VERSION=${TUNNEL_EDGE_IP_VERSION:-auto}
  #     - TUNNEL_REGION=${TUNNEL_REGION:-}
  #   restart: unless-stopped
  #   networks:
  #     - opc-network
  #   depends_on:
  #     - backend
  #     - frontend
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 256M
  #       reservations:
  #         cpus: '0.25'
  #         memory: 128M

networks:
  opc-network:
    name: opc-network
    driver: bridge

