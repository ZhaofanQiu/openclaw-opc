name: OpenClaw OPC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # 版本一致性检查
  # ============================================
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          import re
          import sys
          from pathlib import Path

          expected = Path("VERSION").read_text().strip()
          errors = []

          files = {
              "opc-core __init__": ("packages/opc-core/src/opc_core/__init__.py", r'__version__\s*=\s*"([^"]+)"'),
              "opc-core pyproject": ("packages/opc-core/pyproject.toml", r'^version\s*=\s*"([^"]+)"'),
              "opc-database __init__": ("packages/opc-database/src/opc_database/__init__.py", r'__version__\s*=\s*"([^"]+)"'),
              "opc-database pyproject": ("packages/opc-database/pyproject.toml", r'^version\s*=\s*"([^"]+)"'),
              "opc-openclaw __init__": ("packages/opc-openclaw/src/opc_openclaw/__init__.py", r'__version__\s*=\s*"([^"]+)"'),
              "opc-openclaw pyproject": ("packages/opc-openclaw/pyproject.toml", r'^version\s*=\s*"([^"]+)"'),
              "opc-ui package.json": ("packages/opc-ui/package.json", r'"version"\s*:\s*"([^"]+)"'),
          }

          for name, (path, pattern) in files.items():
              content = Path(path).read_text()
              match = re.search(pattern, content, re.MULTILINE)
              if not match:
                  errors.append(f"{name}: could not find version in {path}")
              elif match.group(1) != expected:
                  errors.append(f"{name}: expected {expected}, got {match.group(1)}")

          if errors:
              print("Version inconsistency detected:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print(f"All versions match: {expected}")
        shell: python

  # ============================================
  # Python 代码格式与 lint
  # ============================================
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on opc-database
        run: cd packages/opc-database && ruff check src tests

      - name: Run ruff on opc-openclaw
        run: cd packages/opc-openclaw && ruff check src tests

      - name: Run ruff on opc-core
        run: cd packages/opc-core && ruff check src tests

  # ============================================
  # Python 测试
  # ============================================
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install packages
        run: |
          pip install --upgrade pip
          cd packages/opc-database && pip install -e ".[dev]"
          cd ../opc-openclaw && pip install -e ".[dev]"
          cd ../opc-core && pip install -e ".[dev]"

      - name: Run opc-database tests
        run: cd packages/opc-database && python -m pytest tests/ -v --tb=short

      - name: Run opc-openclaw tests
        run: cd packages/opc-openclaw && python -m pytest tests/ -v --tb=short

      - name: Run opc-core tests
        run: cd packages/opc-core && python -m pytest tests/ -v --tb=short

  # ============================================
  # 前端测试与构建
  # ============================================
  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/opc-ui/package-lock.json

      - name: Install dependencies
        run: cd packages/opc-ui && npm ci

      - name: Run tests
        run: cd packages/opc-ui && npm run test || echo "No test script configured"

      - name: Run build
        run: cd packages/opc-ui && npm run build

  # ============================================
  # 总结
  # ============================================
  summary:
    runs-on: ubuntu-latest
    needs: [version-check, lint-python, test-python, test-ui]
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version Check | ${{ needs.version-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Python | ${{ needs.lint-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Python | ${{ needs.test-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test UI | ${{ needs.test-ui.result }} |" >> $GITHUB_STEP_SUMMARY
