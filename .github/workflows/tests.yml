name: OpenClaw OPC Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/**'

jobs:
  # ============================================
  # Python 包测试
  # ============================================
  test-python-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        package: [opc-database, opc-openclaw, opc-core]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install all packages in order
      run: |
        pip install --upgrade pip
        # 安装所有第三方依赖
        pip install sqlalchemy asyncpg alembic pydantic httpx pyyaml pydantic-settings fastapi uvicorn aiosqlite
        pip install pytest pytest-asyncio pytest-cov respx
        
        # 按顺序安装本地包（不使用依赖检查）
        cd packages/opc-database
        pip install -e . --no-deps
        cd ../opc-openclaw
        pip install -e . --no-deps
        cd ../opc-core
        pip install -e . --no-deps
    
    - name: Run tests
      run: |
        cd packages/${{ matrix.package }}
        python -m pytest tests/ -v --tb=short

  # ============================================
  # Node.js 前端测试
  # ============================================
  test-opc-ui:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: packages/opc-ui/package-lock.json
    
    - name: Install dependencies
      run: |
        cd packages/opc-ui
        npm ci
    
    - name: Run tests
      run: |
        cd packages/opc-ui
        npm run test
    
    - name: Run build
      run: |
        cd packages/opc-ui
        npm run build

  # ============================================
  # 集成测试
  # ============================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-python-packages]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install all packages
      run: |
        pip install --upgrade pip
        pip install sqlalchemy asyncpg alembic pydantic httpx pyyaml pydantic-settings fastapi uvicorn aiosqlite
        pip install pytest pytest-asyncio pytest-cov respx
        
        cd packages/opc-database && pip install -e . --no-deps && cd ../..
        cd packages/opc-openclaw && pip install -e . --no-deps && cd ../..
        cd packages/opc-core && pip install -e . --no-deps && cd ../..
    
    - name: Run integration tests
      run: |
        python -m pytest packages/opc-core/tests/integration/ -v --tb=short

  # ============================================
  # 测试总结
  # ============================================
  test-summary:
    runs-on: ubuntu-latest
    needs: [test-python-packages, test-opc-ui, integration-tests]
    if: always()
    
    steps:
    - name: Test Summary
      run: |
        echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Python Packages | ${{ needs.test-python-packages.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| OPC UI | ${{ needs.test-opc-ui.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
