name: OpenClaw OPC Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/**'

jobs:
  # ============================================
  # Python 包测试
  # ============================================
  test-python-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        package: [opc-database, opc-openclaw, opc-core]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('packages/${{ matrix.package }}/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
    
    - name: Install dependencies
      run: |
        cd packages/${{ matrix.package }}
        pip install -e ".[dev]"
    
    - name: Run tests with coverage
      run: |
        cd packages/${{ matrix.package }}
        if [ "${{ matrix.package }}" = "opc-database" ]; then
          pytest tests/ -v --cov=opc_database --cov-report=xml --cov-report=term-missing
        elif [ "${{ matrix.package }}" = "opc-openclaw" ]; then
          pytest tests/ -v --cov=opc_openclaw --cov-report=xml --cov-report=term-missing
        elif [ "${{ matrix.package }}" = "opc-core" ]; then
          pytest tests/ -v --cov=opc_core --cov-report=xml --cov-report=term-missing
        fi
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./packages/${{ matrix.package }}/coverage.xml
        flags: ${{ matrix.package }}
        name: ${{ matrix.package }}-py${{ matrix.python-version }}

  # ============================================
  # Node.js 前端测试
  # ============================================
  test-opc-ui:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: packages/opc-ui/package-lock.json
    
    - name: Install dependencies
      run: |
        cd packages/opc-ui
        npm ci
    
    - name: Run tests
      run: |
        cd packages/opc-ui
        npm run test
    
    - name: Run build
      run: |
        cd packages/opc-ui
        npm run build

  # ============================================
  # 集成测试
  # ============================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-python-packages]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install all packages
      run: |
        pip install -e "packages/opc-database[dev]"
        pip install -e "packages/opc-openclaw[dev]"
        pip install -e "packages/opc-core[dev]"
    
    - name: Run integration tests
      run: |
        cd packages/opc-core
        pytest tests/integration/ -v --tb=short
    
    - name: Run unified test script
      run: |
        chmod +x scripts/run_all_tests.sh
        ./scripts/run_all_tests.sh || true

  # ============================================
  # Lint 检查
  # ============================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install lint tools
      run: |
        pip install ruff black
    
    - name: Run Ruff (Python)
      run: |
        ruff check packages/opc-database/src packages/opc-openclaw/src packages/opc-core/src
    
    - name: Check Black formatting
      run: |
        black --check packages/opc-database/src packages/opc-openclaw/src packages/opc-core/src || true
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: packages/opc-ui/package-lock.json
    
    - name: Install UI dependencies
      run: |
        cd packages/opc-ui
        npm ci
    
    - name: Run ESLint
      run: |
        cd packages/opc-ui
        npm run lint || true

  # ============================================
  # 测试总结
  # ============================================
  test-summary:
    runs-on: ubuntu-latest
    needs: [test-python-packages, test-opc-ui, integration-tests, lint]
    if: always()
    
    steps:
    - name: Test Summary
      run: |
        echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Python Packages | ${{ needs.test-python-packages.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| OPC UI | ${{ needs.test-opc-ui.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
