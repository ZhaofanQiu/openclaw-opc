<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务详情 | OpenClaw OPC</title>
    <link rel="stylesheet" href="/dashboard/css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #334155;
            border: none;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #475569;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }

        .btn-outline:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* 任务信息卡片 */
        .info-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .info-title {
            font-size: 18px;
            font-weight: 600;
            color: #f8fafc;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending { background: #713f12; color: #fcd34d; }
        .status-assigned { background: #1e3a5f; color: #60a5fa; }
        .status-in_progress { background: #312e81; color: #a78bfa; }
        .status-completed { background: #14532d; color: #4ade80; }
        .status-failed { background: #7f1d1d; color: #f87171; }

        .info-description {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .info-meta {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
        }

        .info-item strong {
            color: #e2e8f0;
        }

        /* 手册快捷入口 */
        .manual-card {
            background: linear-gradient(135deg, #1e293b 0%, #252f47 100%);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid #3b82f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .manual-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .manual-icon {
            width: 48px;
            height: 48px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .manual-details h3 {
            font-size: 15px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .manual-details p {
            font-size: 13px;
            color: #94a3b8;
        }

        .manual-actions {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* 聊天区域 */
        .chat-container {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            height: calc(100vh - 350px);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h3::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #3b82f6;
        }

        .message-content {
            background: #252f47;
            padding: 12px 16px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: #3b82f6;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #2563eb;
        }

        .send-btn:disabled {
            background: #334155;
            cursor: not-allowed;
        }

        /* 系统消息 */
        .system-message {
            text-align: center;
            padding: 12px;
            color: #64748b;
            font-size: 13px;
        }

        .system-message span {
            background: #252f47;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 16px 12px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .manual-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .manual-actions {
                width: 100%;
            }

            .manual-actions .btn {
                flex: 1;
            }

            .chat-container {
                height: calc(100vh - 400px);
            }

            .message {
                max-width: 90%;
            }
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1100;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: #166534; }
        .toast.error { background: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">
                    <span>←</span> 返回
                </button>
                <h1 id="taskTitle">任务详情</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" id="manualBtn" onclick="viewManual()">
                    <span>📋</span> 手册
                </button>
            </div>
        </div>

        <!-- 任务信息 -->
        <div class="info-card">
            <div class="info-header">
                <div class="info-title" id="infoTitle">--</div>
                <span class="status-badge" id="statusBadge">--</span>
            </div>
            <p class="info-description" id="infoDescription">--</p>
            <div class="info-meta">
                <div class="info-item">
                    <span>👤</span>
                    <span>执行人: <strong id="assigneeName">--</strong></span>
                </div>
                <div class="info-item">
                    <span>💰</span>
                    <span>预算: <strong id="budgetInfo">--</strong></span>
                </div>
                <div class="info-item">
                    <span>📅</span>
                    <span>创建时间: <strong id="createdAt">--</strong></span>
                </div>
            </div>
        </div>

        <!-- 手册快捷入口 -->
        <div class="manual-card" id="manualCard" style="display: none;">
            <div class="manual-info">
                <div class="manual-icon">📋</div>
                <div class="manual-details">
                    <h3>任务手册已生成</h3>
                    <p id="manualMeta">基于任务内容自动生成的执行指南</p>
                </div>
            </div>
            <div class="manual-actions">
                <button class="btn btn-outline btn-sm" onclick="previewManual()">
                    <span>👁️</span> 预览
                </button>
                <button class="btn btn-primary btn-sm" onclick="viewFullManual()">
                    <span>📖</span> 查看完整手册
                </button>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container">
            <div class="chat-header">
                <h3>协作聊天</h3>
                <span id="stepInfo">步骤 1/1</span>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="system-message">
                    <span>👋 任务已开始，可以开始沟通协作</span>
                </div>
            </div>
            
            <div class="chat-input-area">
                <textarea 
                    class="chat-input" 
                    id="messageInput" 
                    placeholder="输入消息..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="/dashboard/js/api.js"></script>
    <script src="/dashboard/js/auth.js"></script>
    <script>
        // 全局状态
        let currentTaskId = null;
        let currentTask = null;
        let currentStepId = null;
        let hasManual = false;

        // 初始化
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentTaskId = urlParams.get('id');

            if (!currentTaskId) {
                showToast('缺少任务 ID', 'error');
                return;
            }

            await loadTask();
            await loadSteps();
            await loadManualInfo();
            await loadMessages();

            // 启动轮询
            setInterval(pollMessages, 5000);
        }

        // 加载任务信息
        async function loadTask() {
            try {
                const task = await Auth.authFetch(`/api/tasks/${currentTaskId}`);
                currentTask = task;

                document.getElementById('taskTitle').textContent = task.title;
                document.getElementById('infoTitle').textContent = task.title;
                document.getElementById('infoDescription').textContent = task.description || '暂无描述';
                
                const statusBadge = document.getElementById('statusBadge');
                statusBadge.textContent = getStatusText(task.status);
                statusBadge.className = `status-badge status-${task.status}`;

                document.getElementById('assigneeName').textContent = task.agent?.name || '未分配';
                document.getElementById('budgetInfo').textContent = `${task.estimated_cost || 0} OC币`;
                document.getElementById('createdAt').textContent = new Date(task.created_at).toLocaleString('zh-CN');
            } catch (error) {
                console.error('Failed to load task:', error);
                showToast('加载任务失败', 'error');
            }
        }

        // 加载步骤信息
        async function loadSteps() {
            try {
                const steps = await Auth.authFetch(`/api/tasks/${currentTaskId}/steps`);
                if (steps.length > 0) {
                    currentStepId = steps[0].id;
                    document.getElementById('stepInfo').textContent = `步骤 1/${steps.length}`;
                }
            } catch (error) {
                console.error('Failed to load steps:', error);
            }
        }

        // 加载手册信息
        async function loadManualInfo() {
            try {
                const manual = await Auth.authFetch(`/api/manuals/task/${currentTaskId}`);
                hasManual = manual.has_manual;

                if (hasManual) {
                    document.getElementById('manualCard').style.display = 'flex';
                    document.getElementById('manualMeta').textContent = 
                        `模板: ${manual.template_name} | 生成于 ${new Date(manual.generated_at).toLocaleString('zh-CN')}`;
                }
            } catch (error) {
                console.error('Failed to load manual:', error);
            }
        }

        // 加载消息
        async function loadMessages() {
            if (!currentStepId) return;

            try {
                const messages = await Auth.authFetch(`/api/tasks/steps/${currentStepId}/messages`);
                renderMessages(messages);
            } catch (error) {
                console.error('Failed to load messages:', error);
            }
        }

        // 渲染消息
        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="system-message">
                        <span>👋 任务已开始，可以开始沟通协作</span>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.sender_type}">
                    <div class="message-avatar">
                        ${msg.sender_type === 'user' ? '👤' : msg.sender_name?.[0]?.toUpperCase() || '🤖'}
                    </div>
                    <div>
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${new Date(msg.created_at).toLocaleString('zh-CN')}</div>
                    </div>
                </div>
            `).join('');

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentStepId) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            try {
                await Auth.authFetch(`/api/tasks/steps/${currentStepId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });

                input.value = '';
                await loadMessages();
            } catch (error) {
                showToast('发送失败: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // 轮询消息
        async function pollMessages() {
            if (!currentStepId) return;
            await loadMessages();
        }

        // 查看手册
        function viewManual() {
            if (hasManual) {
                viewFullManual();
            } else {
                previewManual();
            }
        }

        // 查看完整手册
        function viewFullManual() {
            window.open(`/dashboard/manual.html?task_id=${currentTaskId}`, '_blank');
        }

        // 预览手册
        async function previewManual() {
            try {
                const manual = await Auth.authFetch(`/api/manuals/task/${currentTaskId}`);
                if (manual.has_manual) {
                    // 显示手册弹窗或侧边栏
                    alert(`📋 ${manual.template_name}\n\n${manual.content.substring(0, 500)}...`);
                } else {
                    showToast('暂无手册，请在任务分配后查看', 'info');
                }
            } catch (error) {
                showToast('加载手册失败', 'error');
            }
        }

        // 返回
        function goBack() {
            window.history.back();
        }

        // 键盘事件
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 获取状态文本
        function getStatusText(status) {
            const map = {
                'pending': '待分配',
                'assigned': '已分配',
                'in_progress': '进行中',
                'completed': '已完成',
                'failed': '失败',
                'fused': '已熔断'
            };
            return map[status] || status;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示 Toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
