<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际工作室 - 像素办公室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 4px solid #2a2a4a;
        }

        h1 {
            font-size: 24px;
            color: #667eea;
            text-shadow: 2px 2px 0 #2a2a4a;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 12px;
            color: #888;
        }

        .nav-links {
            margin-top: 15px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
            font-size: 12px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* Office Grid */
        .office-floor {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .office-floor {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .office-floor {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Desk */
        .desk {
            background: #252542;
            border: 4px solid #2a2a4a;
            border-radius: 8px;
            padding: 16px;
            position: relative;
            min-height: 180px;
        }

        .desk.empty {
            border-style: dashed;
            opacity: 0.5;
        }

        .desk.working {
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .desk.idle {
            border-color: #4ade80;
        }

        .desk.offline {
            border-color: #666;
            opacity: 0.6;
        }

        /* Employee Avatar - Pixel Art Style */
        .employee-avatar {
            width: 64px;
            height: 64px;
            background: #1a1a2e;
            border: 3px solid #667eea;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            position: relative;
            image-rendering: pixelated;
            box-shadow: 
                inset 0 0 0 2px #1a1a2e,
                inset 0 0 0 4px #667eea;
        }

        .employee-avatar::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 14px;
            height: 14px;
            border-radius: 2px;
            border: 2px solid #1a1a2e;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3);
        }

        .employee-avatar.online::after {
            background: #4ade80;
        }

        .employee-avatar.offline::after {
            background: #f87171;
        }

        .employee-avatar.unknown::after {
            background: #888;
        }

        /* Pixel Avatar Inner Container */
        .pixel-avatar {
            width: 48px;
            height: 48px;
            position: relative;
            image-rendering: pixelated;
        }

        /* Pixel Art - Frontend Developer (Laptop/Code theme) */
        .pixel-avatar.frontend {
            background: 
                /* Row 1 */
                linear-gradient(to right, transparent 20px, #4ade80 20px, #4ade80 28px, transparent 28px),
                /* Row 2-3 - Hair */
                linear-gradient(to right, #8b5a2b 16px, #8b5a2b 32px) 0 4px / 100% 4px,
                /* Row 4-6 - Face */
                linear-gradient(to right, #f4c2a1 16px, #f4c2a1 32px) 0 12px / 100% 12px,
                /* Eyes */
                linear-gradient(to right, transparent 18px, #333 18px, #333 22px, transparent 22px, transparent 26px, #333 26px, #333 30px, transparent 30px) 0 16px / 100% 4px,
                /* Row 7-10 - Body with laptop */
                linear-gradient(to right, #667eea 12px, #667eea 36px) 0 24px / 100% 20px,
                /* Laptop screen glow */
                linear-gradient(to right, transparent 14px, #4ade80 14px, #4ade80 18px, transparent 18px, transparent 22px, #4ade80 22px, #4ade80 26px, transparent 26px, transparent 30px, #4ade80 30px, #4ade80 34px, transparent 34px) 0 28px / 100% 4px,
                /* Laptop base */
                linear-gradient(to right, #4a5568 8px, #4a5568 40px) 0 44px / 100% 4px;
            background-repeat: no-repeat;
        }

        /* Pixel Art - Backend Developer (Gear/Terminal theme) */
        .pixel-avatar.backend {
            background: 
                /* Hair */
                linear-gradient(to right, #2d3748 16px, #2d3748 32px) 0 4px / 100% 4px,
                /* Face */
                linear-gradient(to right, #e8c4a0 16px, #e8c4a0 32px) 0 12px / 100% 12px,
                /* Eyes - glasses */
                linear-gradient(to right, transparent 16px, #333 16px, #333 20px, transparent 20px, transparent 24px, #333 24px, #333 28px, transparent 28px) 0 16px / 100% 4px,
                /* Body - dark hoodie */
                linear-gradient(to right, #2d3748 12px, #2d3748 36px) 0 24px / 100% 20px,
                /* Terminal screen */
                linear-gradient(to right, #1a202c 16px, #1a202c 32px) 0 28px / 100% 12px,
                /* Green code lines */
                linear-gradient(to right, transparent 18px, #4ade80 18px, #4ade80 24px, transparent 24px) 0 30px / 100% 2px,
                linear-gradient(to right, transparent 18px, #4ade80 18px, #4ade80 26px, transparent 26px) 0 34px / 100% 2px;
            background-repeat: no-repeat;
        }

        /* Pixel Art - Designer (Art/Creative theme) */
        .pixel-avatar.designer {
            background: 
                /* Hair - styled */
                linear-gradient(to right, #c0392b 14px, #c0392b 34px) 0 2px / 100% 6px,
                /* Face */
                linear-gradient(to right, #f5d0c5 16px, #f5d0c5 32px) 0 12px / 100% 12px,
                /* Eyes - creative sparkle */
                linear-gradient(to right, transparent 18px, #e74c3c 18px, #e74c3c 22px, transparent 22px, transparent 26px, #9b59b6 26px, #9b59b6 30px, transparent 30px) 0 16px / 100% 4px,
                /* Body - colorful */
                linear-gradient(to right, #e74c3c 12px, #e74c3c 20px, #f39c12 20px, #f39c12 28px, #9b59b6 28px, #9b59b6 36px) 0 24px / 100% 20px,
                /* Paint brush */
                linear-gradient(to right, transparent 8px, #8b4513 8px, #8b4513 12px, transparent 12px) 0 28px / 100% 16px,
                /* Palette */
                linear-gradient(to right, transparent 36px, #f1c40f 36px, #f1c40f 40px, transparent 40px) 0 32px / 100% 4px,
                linear-gradient(to right, transparent 38px, #3498db 38px, #38px 42px, transparent 42px) 0 36px / 100% 4px;
            background-repeat: no-repeat;
        }

        /* Pixel Art - QA/Tester (Bug/Magnifier theme) */
        .pixel-avatar.qa {
            background: 
                /* Hair */
                linear-gradient(to right, #5d4e37 16px, #5d4e37 32px) 0 4px / 100% 4px,
                /* Face */
                linear-gradient(to right, #dbb898 16px, #dbb898 32px) 0 12px / 100% 12px,
                /* Eyes - focused */
                linear-gradient(to right, transparent 18px, #333 18px, #333 22px, transparent 22px, transparent 26px, #333 26px, #333 30px, transparent 30px) 0 16px / 100% 4px,
                /* Body - lab coat */
                linear-gradient(to right, #fff 12px, #fff 36px) 0 24px / 100% 20px,
                /* Magnifying glass */
                linear-gradient(to right, transparent 6px, #718096 6px, #718096 14px, transparent 14px) 0 28px / 100% 12px,
                linear-gradient(to right, transparent 8px, #a0aec0 8px, #a0aec0 12px, transparent 12px) 0 30px / 100% 8px,
                /* Bug icon on coat */
                linear-gradient(to right, transparent 28px, #e53e3e 28px, #e53e3e 32px, transparent 32px) 0 34px / 100% 4px;
            background-repeat: no-repeat;
        }

        /* Pixel Art - Partner/Boss (Crown/Leadership theme) */
        .pixel-avatar.partner {
            background: 
                /* Crown */
                linear-gradient(to right, transparent 16px, #f1c40f 16px, #f1c40f 32px, transparent 32px) 0 0 / 100% 6px,
                linear-gradient(to right, transparent 18px, #f39c12 18px, #f39c12 20px, transparent 20px, transparent 26px, #f39c12 26px, #f39c12 28px, transparent 28px) 0 2px / 100% 4px,
                /* Hair */
                linear-gradient(to right, #2c3e50 16px, #2c3e50 32px) 0 6px / 100% 4px,
                /* Face - confident */
                linear-gradient(to right, #f4c2a1 16px, #f4c2a1 32px) 0 12px / 100% 12px,
                /* Eyes - sharp */
                linear-gradient(to right, transparent 18px, #2c3e50 18px, #2c3e50 22px, transparent 22px, transparent 26px, #2c3e50 26px, #2c3e50 30px, transparent 30px) 0 16px / 100% 4px,
                /* Body - suit */
                linear-gradient(to right, #2c3e50 12px, #2c3e50 36px) 0 24px / 100% 20px,
                /* Tie */
                linear-gradient(to right, transparent 22px, #c0392b 22px, #c0392b 26px, transparent 26px) 0 26px / 100% 16px,
                /* Gold accent */
                linear-gradient(to right, transparent 20px, #f1c40f 20px, #f1c40f 28px, transparent 28px) 0 40px / 100% 2px;
            background-repeat: no-repeat;
        }

        /* Pixel Art - Default/Unknown */
        .pixel-avatar.default {
            background: 
                linear-gradient(to right, #718096 16px, #718096 32px) 0 4px / 100% 4px,
                linear-gradient(to right, #a0aec0 16px, #a0aec0 32px) 0 12px / 100% 12px,
                linear-gradient(to right, transparent 18px, #4a5568 18px, #4a5568 22px, transparent 22px, transparent 26px, #4a5568 26px, #4a5568 30px, transparent 30px) 0 16px / 100% 4px,
                linear-gradient(to right, #718096 12px, #718096 36px) 0 24px / 100% 20px;
            background-repeat: no-repeat;
        }

        /* Pixel breathing animation */
        @keyframes pixel-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .pixel-avatar {
            animation: pixel-breathe 3s ease-in-out infinite;
        }

        .desk.working .pixel-avatar {
            animation-duration: 1s;
        }

        /* Employee Info */
        .employee-name {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .employee-role {
            text-align: center;
            font-size: 10px;
            color: #888;
            margin-bottom: 8px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            text-align: center;
            width: 100%;
        }

        .status-badge.idle {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .status-badge.working {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .status-badge.offline {
            background: rgba(136, 136, 136, 0.2);
            color: #888;
        }

        /* Budget Bar */
        .budget-bar {
            margin-top: 12px;
            height: 8px;
            background: #1a1a2e;
            border-radius: 4px;
            overflow: hidden;
        }

        .budget-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .budget-fill.high {
            background: #4ade80;
        }

        .budget-fill.medium {
            background: #fbbf24;
        }

        .budget-fill.low {
            background: #f87171;
        }

        .budget-text {
            font-size: 9px;
            color: #666;
            text-align: center;
            margin-top: 4px;
        }

        /* Task Board */
        .task-board {
            background: #252542;
            border: 4px solid #2a2a4a;
            border-radius: 8px;
            padding: 20px;
        }

        .task-board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #2a2a4a;
        }

        .task-board-title {
            font-size: 16px;
            color: #667eea;
        }

        .task-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
        }

        .task-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .task-stat-dot.pending {
            background: #888;
        }

        .task-stat-dot.assigned {
            background: #fbbf24;
        }

        .task-stat-dot.completed {
            background: #4ade80;
        }

        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 6px;
            border-left: 4px solid transparent;
        }

        .task-item.pending {
            border-left-color: #888;
        }

        .task-item.assigned {
            border-left-color: #fbbf24;
        }

        .task-item.completed {
            border-left-color: #4ade80;
        }

        .task-icon {
            font-size: 20px;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 13px;
            margin-bottom: 2px;
        }

        .task-meta {
            font-size: 10px;
            color: #666;
        }

        .task-assignee {
            font-size: 11px;
            padding: 4px 8px;
            background: #2a2a4a;
            border-radius: 4px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a4a;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty Desk */
        .empty-desk-icon {
            font-size: 48px;
            text-align: center;
            margin: 20px 0;
            opacity: 0.3;
        }

        .empty-desk-text {
            text-align: center;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 星际工作室 - 像素办公室</h1>
            <p class="subtitle">实时监控员工状态与任务进度</p>
            <div class="nav-links">
                <a href="/dashboard">← 返回Dashboard</a>
                <a href="/dashboard">刷新数据</a>
            </div>
        </header>

        <!-- Office Floor -->
        <div class="office-floor" id="office-floor">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载办公室...</p>
            </div>
        </div>

        <!-- Task Board -->
        <div class="task-board">
            <div class="task-board-header">
                <div class="task-board-title">📋 任务看板</div>
                <div class="task-stats">
                    <div class="task-stat">
                        <span class="task-stat-dot pending"></span>
                        <span id="stat-pending">0 待分配</span>
                    </div>
                    <div class="task-stat">
                        <span class="task-stat-dot assigned"></span>
                        <span id="stat-assigned">0 进行中</span>
                    </div>
                    <div class="task-stat">
                        <span class="task-stat-dot completed"></span>
                        <span id="stat-completed">0 已完成</span>
                    </div>
                </div>
            </div>
            <div class="task-list" id="task-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载任务...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080'
            : '';
        const REFRESH_INTERVAL = 5000;

        // Load office data
        async function loadOffice() {
            try {
                const [agentsRes, tasksRes] = await Promise.all([
                    fetch(`${API_BASE}/api/agents`),
                    fetch(`${API_BASE}/api/tasks`)
                ]);

                if (!agentsRes.ok || !tasksRes.ok) {
                    throw new Error('Failed to load data');
                }

                const agents = await agentsRes.json();
                const tasks = await tasksRes.json();

                renderOffice(agents, tasks);
                renderTaskBoard(tasks);
            } catch (error) {
                console.error('Error loading office:', error);
                document.getElementById('office-floor').innerHTML = `
                    <div class="loading" style="grid-column: 1/-1;">
                        <p>❌ 加载失败</p>
                        <p style="font-size: 12px; margin-top: 8px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Render office floor
        function renderOffice(agents, tasks) {
            const container = document.getElementById('office-floor');
            
            // Create 8 desk slots
            const totalDesks = 8;
            let html = '';

            for (let i = 0; i < totalDesks; i++) {
                const agent = agents[i];
                
                if (agent) {
                    const task = tasks.find(t => t.agent_id === agent.id && t.status === 'assigned');
                    const isWorking = agent.status === 'working';
                    const isOnline = agent.is_online;
                    
                    const budgetPercent = agent.total_budget > 0 
                        ? (agent.remaining_budget / agent.total_budget) * 100 
                        : 0;
                    const budgetClass = budgetPercent > 60 ? 'high' : budgetPercent > 30 ? 'medium' : 'low';
                    
                    // Determine pixel avatar class based on position
                    let avatarClass = 'default';
                    const position = (agent.position_title || '').toLowerCase();
                    const name = (agent.name || '').toLowerCase();
                    
                    if (position.includes('前端') || name.includes('前端') || name.includes('frontend')) {
                        avatarClass = 'frontend';
                    } else if (position.includes('后端') || name.includes('后端') || name.includes('backend')) {
                        avatarClass = 'backend';
                    } else if (position.includes('设计') || name.includes('设计') || name.includes('designer')) {
                        avatarClass = 'designer';
                    } else if (position.includes('测试') || name.includes('测试') || name.includes('qa')) {
                        avatarClass = 'qa';
                    } else if (position.includes('合伙人') || name.includes('partner') || agent.emoji === '👑') {
                        avatarClass = 'partner';
                    }
                    
                    html += `
                        <div class="desk ${isWorking ? 'working' : isOnline ? 'idle' : 'offline'}">
                            <div class="employee-avatar ${isOnline ? 'online' : 'offline'}">
                                <div class="pixel-avatar ${avatarClass}"></div>
                            </div>
                            <div class="employee-name">${agent.name}</div>
                            <div class="employee-role">${agent.position_title}</div>
                            <div class="status-badge ${agent.status}">
                                ${isWorking ? '💼 工作中' : isOnline ? '☕ 空闲' : '💤 离线'}
                            </div>
                            <div class="budget-bar">
                                <div class="budget-fill ${budgetClass}" style="width: ${budgetPercent}%"></div>
                            </div>
                            <div class="budget-text">
                                💰 ${Math.round(agent.remaining_budget)} / ${Math.round(agent.total_budget)} OC币
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="desk empty">
                            <div class="empty-desk-icon">🪑</div>
                            <div class="empty-desk-text">空工位</div>
                        </div>
                    `;
                }
            }

            container.innerHTML = html;
        }

        // Render task board
        function renderTaskBoard(tasks) {
            const container = document.getElementById('task-list');
            
            // Update stats
            const pending = tasks.filter(t => t.status === 'pending').length;
            const assigned = tasks.filter(t => t.status === 'assigned').length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            
            document.getElementById('stat-pending').textContent = `${pending} 待分配`;
            document.getElementById('stat-assigned').textContent = `${assigned} 进行中`;
            document.getElementById('stat-completed').textContent = `${completed} 已完成`;

            // Show recent tasks (max 6)
            const recentTasks = tasks.slice(0, 6);
            
            if (recentTasks.length === 0) {
                container.innerHTML = '<div class="loading">暂无任务</div>';
                return;
            }

            container.innerHTML = recentTasks.map(task => {
                const statusIcon = {
                    'pending': '⏳',
                    'assigned': '🔨',
                    'completed': '✅',
                    'failed': '❌'
                }[task.status] || '📋';

                return `
                    <div class="task-item ${task.status}">
                        <div class="task-icon">${statusIcon}</div>
                        <div class="task-info">
                            <div class="task-title">${task.title}</div>
                            <div class="task-meta">
                                💰 ${task.estimated_cost} OC币 · ${task.priority}
                            </div>
                        </div>
                        ${task.assigned_to ? `<div class="task-assignee">${task.assigned_to}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Initial load
        loadOffice();

        // Auto refresh
        setInterval(loadOffice, REFRESH_INTERVAL);
    </script>
</body>
</html>
