<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工技能路径 - OpenClaw OPC</title>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a4a;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .back-btn:hover {
            color: #fff;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header-subtitle {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        
        .agent-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .agent-select {
            padding: 10px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            min-width: 200px;
        }
        
        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* Path Visualization */
        .path-section {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2a2a4a;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .path-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .path-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .path-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .path-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .path-desc {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .progress-ring {
            position: relative;
            width: 80px;
            height: 80px;
        }
        
        .progress-ring svg {
            transform: rotate(-90deg);
        }
        
        .progress-ring-bg {
            fill: none;
            stroke: #2a2a4a;
            stroke-width: 8;
        }
        
        .progress-ring-fill {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s;
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            font-weight: 600;
        }
        
        /* Stages */
        .stages-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .stage-item {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .stage-item:hover {
            border-color: #3a3a5a;
        }
        
        .stage-item.completed {
            border-color: #10b981;
        }
        
        .stage-item.in-progress {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.1);
        }
        
        .stage-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            cursor: pointer;
        }
        
        .stage-number {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .stage-item.completed .stage-number {
            background: #10b981;
            color: #fff;
        }
        
        .stage-item.in-progress .stage-number {
            background: #667eea;
            color: #fff;
        }
        
        .stage-info {
            flex: 1;
        }
        
        .stage-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .stage-status {
            font-size: 12px;
            color: #666;
        }
        
        .stage-item.completed .stage-status {
            color: #10b981;
        }
        
        .stage-item.in-progress .stage-status {
            color: #667eea;
        }
        
        .stage-progress {
            text-align: right;
        }
        
        .stage-progress-value {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
        
        .stage-progress-label {
            font-size: 11px;
            color: #666;
        }
        
        .stage-expand {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: transform 0.3s;
        }
        
        .stage-item.expanded .stage-expand {
            transform: rotate(180deg);
        }
        
        .stage-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        
        .stage-item.expanded .stage-content {
            max-height: 500px;
        }
        
        .stage-details {
            padding: 0 20px 20px;
        }
        
        /* Skills Grid */
        .skills-section {
            margin-bottom: 20px;
        }
        
        .skills-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .skill-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #2a2a4a;
            border-radius: 20px;
            font-size: 13px;
        }
        
        .skill-tag.acquired {
            background: #10b98133;
            color: #10b981;
        }
        
        .skill-tag::before {
            content: '○';
            font-size: 10px;
        }
        
        .skill-tag.acquired::before {
            content: '●';
        }
        
        /* Required Steps */
        .steps-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2a2a4a;
        }
        
        .steps-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .step-tag {
            padding: 6px 12px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            font-size: 12px;
            color: #888;
        }
        
        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .sidebar-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2a4a;
        }
        
        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Next Milestone */
        .milestone-card {
            background: linear-gradient(135deg, #667eea22, #764ba222);
            border: 1px solid #667eea44;
            border-radius: 12px;
            padding: 16px;
        }
        
        .milestone-label {
            font-size: 12px;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .milestone-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .milestone-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .milestone-skill {
            padding: 4px 10px;
            background: #667eea33;
            border-radius: 12px;
            font-size: 12px;
        }
        
        /* Suggestions */
        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .suggestion-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #0f0f1a;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .suggestion-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .stat-box {
            background: #0f0f1a;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        /* Path Selector */
        .path-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .path-option {
            flex-shrink: 0;
            padding: 12px 20px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-width: 120px;
        }
        
        .path-option:hover {
            border-color: #667eea;
        }
        
        .path-option.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }
        
        .path-option-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .path-option-count {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        /* Compare Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
            border: 1px solid #2a2a4a;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }
        
        .compare-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .compare-table th,
        .compare-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .compare-table th {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* SVG Gradient */
        .svg-defs {
            position: absolute;
            width: 0;
            height: 0;
        }
    </style>
</head>
<body>
    <!-- SVG Gradient Definition -->
    <svg class="svg-defs">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#667eea" />
                <stop offset="100%" style="stop-color:#764ba2" />
            </linearGradient>
        </defs>
    </svg>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="/dashboard" class="back-btn">← 返回Dashboard</a>
            
            <div class="header-content">
                <div>
                    <div class="header-title">🎯 员工技能路径</div>
                    <div class="header-subtitle">查看员工成长轨迹和技能发展</div>
                </div>
                
                <div class="agent-selector">
                    <select class="agent-select" id="agent-select" onchange="loadAgentPath()">
                        <option value="">选择员工...</option>
                    </select>
                    <button class="btn btn-secondary" onclick="openCompareModal()">📊 对比</button>
                </div>
            </div>
        </div>
        
        <!-- Path Selector -->
        <div class="path-selector" id="path-selector">
            <!-- Dynamic path options -->
        </div>
        
        <!-- Main Content -->
        <div class="main-content" id="main-content">
            <!-- Path Visualization -->
            <div class="path-section">
                <div class="path-header">
                    <div class="path-info">
                        <div class="path-icon" id="path-icon">🚀</div>
                        <div>
                            <div class="path-name" id="path-name">加载中...</div>
                            <div class="path-desc" id="path-desc"></div>
                        </div>
                    </div>
                    
                    <div class="progress-ring">
                        <svg width="80" height="80">
                            <circle class="progress-ring-bg" cx="40" cy="40" r="36" />
                            <circle class="progress-ring-fill" id="progress-circle" cx="40" cy="40" r="36" 
                                stroke-dasharray="226" stroke-dashoffset="226" />
                        </svg>
                        <div class="progress-text" id="progress-text">0%</div>
                    </div>
                </div>
                
                <div class="stages-container" id="stages-container">
                    <!-- Dynamic stages -->
                </div>
            </div>
            
            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Next Milestone -->
                <div class="sidebar-card">
                    <div class="sidebar-title">🎯 下一个里程碑</div>
                    
                    <div class="milestone-card" id="milestone-card">
                        <div class="milestone-label">目标阶段</div>
                        <div class="milestone-name" id="milestone-name">-</div>
                        <div class="milestone-skills" id="milestone-skills">
                            <!-- Dynamic skills -->
                        </div>
                    </div>
                </div>
                
                <!-- Suggestions -->
                <div class="sidebar-card">
                    <div class="sidebar-title">💡 成长建议</div>
                    
                    <div class="suggestions-list" id="suggestions-list">
                        <!-- Dynamic suggestions -->
                    </div>
                </div>
                
                <!-- Current Skills -->
                <div class="sidebar-card">
                    <div class="sidebar-title">🛠️ 当前技能</div>
                    
                    <div class="skills-grid" id="current-skills">
                        <!-- Dynamic skills -->
                    </div>
                </div>
                
                <!-- Stats -->
                <div class="sidebar-card">
                    <div class="sidebar-title">📊 统计数据</div>
                    
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-value" id="stat-completed">0</div>
                            <div class="stat-label">已完成阶段</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="stat-skills">0</div>
                            <div class="stat-label">已掌握技能</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="stat-total">0</div>
                            <div class="stat-label">总阶段数</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="stat-progress">0%</div>
                            <div class="stat-label">整体进度</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Compare Modal -->
    <div class="modal-overlay" id="compare-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">📊 员工技能对比</div>
                <button class="modal-close" onclick="closeModal('compare-modal')">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label">选择要对比的员工（最多5人）</label>
                    <div id="compare-agent-list" style="display: flex; flex-wrap: wrap; gap: 8px;">
                        <!-- Dynamic checkboxes -->
                    </div>
                </div>
                
                <div id="compare-result">
                    <!-- Dynamic comparison table -->
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('compare-modal')">关闭</button>
                <button class="btn btn-primary" onclick="performCompare()">开始对比</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentAgentId = null;
        let allAgents = [];
        let allPaths = [];
        let currentPathData = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            currentAgentId = getCurrentUserId();
            loadAgents();
            loadAllPaths();
        });
        
        // Load Agents
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                allAgents = await response.json();
                
                // Populate selector
                const select = document.getElementById('agent-select');
                select.innerHTML = '<option value="">选择员工...</option>' + 
                    allAgents.map(a => `<option value="${a.id}">${a.name} (${a.position_level === 5 ? 'Partner' : 'Level ' + a.level})</option>`).join('');
                
                // Auto-select if agent_id in URL
                const urlParams = new URLSearchParams(window.location.search);
                const agentId = urlParams.get('agent_id');
                if (agentId) {
                    select.value = agentId;
                    loadAgentPath();
                }
            } catch (error) {
                console.error('Failed to load agents:', error);
            }
        }
        
        // Load All Paths
        async function loadAllPaths() {
            try {
                const response = await fetch('/api/agent-skill-paths/paths');
                const data = await response.json();
                allPaths = data.paths || [];
                renderPathSelector();
            } catch (error) {
                console.error('Failed to load paths:', error);
            }
        }
        
        // Render Path Selector
        function renderPathSelector() {
            const container = document.getElementById('path-selector');
            container.innerHTML = allPaths.map(p => `
                <div class="path-option" data-path="${p.id}" onclick="selectPath('${p.id}')">
                    <div class="path-option-name">${p.name}</div>
                    <div class="path-option-count">${p.stages_count} 个阶段</div>
                </div>
            `).join('');
        }
        
        // Load Agent Path
        async function loadAgentPath() {
            const agentId = document.getElementById('agent-select').value;
            if (!agentId) {
                document.getElementById('main-content').style.display = 'none';
                return;
            }
            
            try {
                const response = await fetch(`/api/agent-skill-paths/agent/${agentId}`);
                currentPathData = await response.json();
                
                document.getElementById('main-content').style.display = 'grid';
                renderPathData();
            } catch (error) {
                console.error('Failed to load agent path:', error);
            }
        }
        
        // Render Path Data
        function renderPathData() {
            const data = currentPathData;
            const path = data.recommended_path;
            const visualization = data.path_visualization;
            
            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('agent_id', data.agent.id);
            window.history.replaceState({}, '', url);
            
            // Path selector active state
            document.querySelectorAll('.path-option').forEach(el => {
                el.classList.toggle('active', el.dataset.path === path.id);
            });
            
            // Path header
            const pathIcons = {
                'fullstack': '🚀',
                'backend': '⚙️',
                'frontend': '🎨',
                'reviewer': '🔍'
            };
            document.getElementById('path-icon').textContent = pathIcons[path.id] || '🎯';
            document.getElementById('path-name').textContent = path.name;
            document.getElementById('path-desc').textContent = `推荐路径 · 基于${data.agent.name}的技能和工作历史`;
            
            // Progress ring
            const completedStages = visualization.filter(s => s.status === 'completed').length;
            const totalStages = visualization.length;
            const progress = totalStages > 0 ? (completedStages / totalStages * 100) : 0;
            
            const circumference = 2 * Math.PI * 36;
            const offset = circumference - (progress / 100) * circumference;
            document.getElementById('progress-circle').style.strokeDashoffset = offset;
            document.getElementById('progress-text').textContent = Math.round(progress) + '%';
            
            // Stages
            renderStages(visualization);
            
            // Next milestone
            renderMilestone(data.next_milestone);
            
            // Suggestions
            renderSuggestions(data.growth_suggestions);
            
            // Current skills
            renderCurrentSkills(data.current_skills);
            
            // Stats
            document.getElementById('stat-completed').textContent = completedStages;
            document.getElementById('stat-skills').textContent = data.current_skills.length;
            document.getElementById('stat-total').textContent = totalStages;
            document.getElementById('stat-progress').textContent = Math.round(progress) + '%';
        }
        
        // Render Stages
        function renderStages(stages) {
            const container = document.getElementById('stages-container');
            
            container.innerHTML = stages.map((stage, index) => {
                const statusClass = stage.status;
                const statusText = {
                    'completed': '✅ 已完成',
                    'in_progress': '🔄 进行中',
                    'locked': '🔒 未解锁'
                }[stage.status] || stage.status;
                
                const skillsHtml = stage.skills.map(s => 
                    `<span class="skill-tag ${s.acquired ? 'acquired' : ''}">${s.name}</span>`
                ).join('');
                
                const stepsHtml = stage.required_steps.map(s => 
                    `<span class="step-tag">${s}</span>`
                ).join('');
                
                return `
                    <div class="stage-item ${statusClass}" data-stage="${stage.stage}">
                        <div class="stage-header" onclick="toggleStage(${stage.stage})">
                            <div class="stage-number">${stage.stage}</div>
                            
                            <div class="stage-info">
                                <div class="stage-name">${stage.name}</div>
                                <div class="stage-status">${statusText}</div>
                            </div>
                            
                            <div class="stage-progress">
                                <div class="stage-progress-value">${Math.round(stage.progress.skill_match)}%</div>
                                <div class="stage-progress-label">技能匹配</div>
                            </div>
                            
                            <div class="stage-expand">▼</div>
                        </div>
                        
                        <div class="stage-content">
                            <div class="stage-details">
                                <div class="skills-section">
                                    <div class="skills-title">所需技能</div>
                                    <div class="skills-grid">${skillsHtml}</div>
                                </div>
                                
                                <div class="steps-section">
                                    <div class="skills-title">需要完成的步骤类型</div>
                                    <div class="steps-list">${stepsHtml}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Toggle Stage
        function toggleStage(stageNum) {
            const stageEl = document.querySelector(`.stage-item[data-stage="${stageNum}"]`);
            stageEl.classList.toggle('expanded');
        }
        
        // Render Milestone
        function renderMilestone(milestone) {
            if (!milestone) {
                document.getElementById('milestone-name').textContent = '已完成所有阶段！🎉';
                document.getElementById('milestone-skills').innerHTML = '';
                return;
            }
            
            document.getElementById('milestone-name').textContent = milestone.name;
            document.getElementById('milestone-skills').innerHTML = milestone.missing_skills.map(s => 
                `<span class="milestone-skill">${s}</span>`
            ).join('');
        }
        
        // Render Suggestions
        function renderSuggestions(suggestions) {
            const container = document.getElementById('suggestions-list');
            
            if (!suggestions || suggestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        <div style="font-size: 32px; margin-bottom: 8px;">✨</div>
                        <div>表现优秀！暂无建议</div>
                    </div>
                `;
                return;
            }
            
            const icons = ['🎯', '📚', '💪', '⚡', '🔥'];
            container.innerHTML = suggestions.map((s, i) => `
                <div class="suggestion-item">
                    <div class="suggestion-icon">${icons[i % icons.length]}</div>
                    <div>${s}</div>
                </div>
            `).join('');
        }
        
        // Render Current Skills
        function renderCurrentSkills(skills) {
            const container = document.getElementById('current-skills');
            
            if (!skills || skills.length === 0) {
                container.innerHTML = '<span style="color: #666;">暂无技能</span>';
                return;
            }
            
            container.innerHTML = skills.map(s => 
                `<span class="skill-tag acquired">${s}</span>`
            ).join('');
        }
        
        // Select Path
        function selectPath(pathId) {
            // This would switch to view a different path for the same agent
            // For now, just highlight it
            document.querySelectorAll('.path-option').forEach(el => {
                el.classList.toggle('active', el.dataset.path === pathId);
            });
        }
        
        // Compare Modal
        function openCompareModal() {
            const listEl = document.getElementById('compare-agent-list');
            listEl.innerHTML = allAgents.map(a => `
                <label style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #0f0f1a; border-radius: 8px; cursor: pointer;">
                    <input type="checkbox" value="${a.id}" class="compare-checkbox">
                    <span>${a.name}</span>
                </label>
            `).join('');
            
            document.getElementById('compare-result').innerHTML = '';
            openModal('compare-modal');
        }
        
        async function performCompare() {
            const checkboxes = document.querySelectorAll('.compare-checkbox:checked');
            const selectedIds = Array.from(checkboxes).map(cb => cb.value);
            
            if (selectedIds.length < 2) {
                alert('请至少选择2名员工进行对比');
                return;
            }
            
            if (selectedIds.length > 5) {
                alert('最多选择5名员工');
                return;
            }
            
            try {
                const response = await fetch('/api/agent-skill-paths/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_ids: selectedIds })
                });
                
                const data = await response.json();
                renderComparison(data.comparison);
            } catch (error) {
                console.error('Failed to compare:', error);
            }
        }
        
        function renderComparison(comparison) {
            const container = document.getElementById('compare-result');
            
            container.innerHTML = `
                <table class="compare-table">
                    <thead>
                        <tr>
                            <th>员工</th>
                            <th>当前等级</th>
                            <th>推荐路径</th>
                            <th>当前阶段</th>
                            <th>下一个里程碑</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${comparison.map(c => `
                            <tr>
                                <td>${c.agent_name}</td>
                                <td>Level ${c.current_level}</td>
                                <td>${c.recommended_path}</td>
                                <td>阶段 ${c.current_stage}</td>
                                <td>${c.next_milestone}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        // Modal Functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // Helpers
        function getCurrentUserId() {
            return localStorage.getItem('current_agent_id') || 'partner';
        }
        
        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
