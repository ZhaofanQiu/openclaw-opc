<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent交互日志 - OpenClaw OPC</title>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a4a;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-subtitle {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-value.success { color: #10b981; }
        .stat-value.error { color: #ef4444; }
        .stat-value.warning { color: #f59e0b; }
        .stat-value.info { color: #667eea; }
        
        .stat-label {
            font-size: 13px;
            color: #888;
        }
        
        /* Filters */
        .filters {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .filter-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-input, .filter-select {
            padding: 10px 14px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            min-width: 150px;
        }
        
        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-left: auto;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        
        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        /* Log Table */
        .log-container {
            background: #1a1a2e;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
        }
        
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .log-table th {
            background: #0f0f1a;
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .log-table td {
            padding: 16px;
            border-bottom: 1px solid #2a2a4a;
            font-size: 13px;
            vertical-align: top;
        }
        
        .log-table tr:hover {
            background: #1f1f35;
        }
        
        .log-table tr:last-child td {
            border-bottom: none;
        }
        
        /* Log Type Badge */
        .log-type {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .log-type.message { background: #667eea33; color: #667eea; }
        .log-type.cli { background: #10b98133; color: #10b981; }
        .log-type.api { background: #f59e0b33; color: #f59e0b; }
        .log-type.session_send { background: #8b5cf633; color: #8b5cf6; }
        
        /* Direction Badge */
        .direction {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }
        
        .direction.outgoing { color: #10b981; }
        .direction.incoming { color: #667eea; }
        
        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
        }
        
        .status-badge.success { background: #10b98133; color: #10b981; }
        .status-badge.error { background: #ef444433; color: #ef4444; }
        
        /* Content Preview */
        .content-preview {
            max-width: 400px;
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            color: #aaa;
            line-height: 1.5;
            cursor: pointer;
        }
        
        .content-preview:hover {
            color: #fff;
        }
        
        /* Agent Info */
        .agent-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .agent-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .agent-name {
            font-weight: 500;
        }
        
        .agent-id {
            font-size: 11px;
            color: #666;
            font-family: monospace;
        }
        
        /* Duration */
        .duration {
            font-family: monospace;
            font-size: 12px;
            color: #888;
        }
        
        /* Timestamp */
        .timestamp {
            font-family: monospace;
            font-size: 12px;
            color: #888;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
            border: 1px solid #2a2a4a;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: 60vh;
        }
        
        .code-block {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px;
            border-top: 1px solid #2a2a4a;
        }
        
        .page-btn {
            padding: 8px 14px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            font-size: 13px;
        }
        
        .page-btn:hover:not(:disabled) {
            background: #2a2a4a;
            color: #fff;
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-btn.active {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }
        
        .page-info {
            color: #888;
            font-size: 13px;
            padding: 0 12px;
        }
        
        /* Auto Refresh Toggle */
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #0f0f1a;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .toggle-switch {
            width: 40px;
            height: 22px;
            background: #2a2a4a;
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .toggle-switch.active {
            background: #10b981;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        
        .toggle-switch.active::after {
            transform: translateX(18px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="/dashboard" class="back-btn">← 返回Dashboard</a>
            <div class="header-title">
                📋 Agent交互日志
                <span style="font-size: 14px; color: #888; font-weight: normal;">实时调试</span>
            </div>
            <div class="header-subtitle">记录所有与OpenClaw Agent的交互，包括CLI调用、API请求和响应</div>
        </div>
        
        <!-- Stats -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="stat-value info" id="stat-total">0</div>
                <div class="stat-label">总交互数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value success" id="stat-success">0</div>
                <div class="stat-label">成功率 (%)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value warning" id="stat-agents">0</div>
                <div class="stat-label">涉及Agent</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-avg-duration">0ms</div>
                <div class="stat-label">平均响应时间</div>
            </div>
        </div>
        
        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Agent</label>
                <select class="filter-select" id="filter-agent" onchange="loadLogs()">
                    <option value="">全部</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label class="filter-label">交互类型</label>
                <select class="filter-select" id="filter-type" onchange="loadLogs()">
                    <option value="">全部</option>
                    <option value="cli">CLI调用</option>
                    <option value="api">API调用</option>
                    <option value="message">消息</option>
                    <option value="session_send">Session发送</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label class="filter-label">方向</label>
                <select class="filter-select" id="filter-direction" onchange="loadLogs()">
                    <option value="">全部</option>
                    <option value="outgoing">发送 →</option>
                    <option value="incoming">接收 ←</option>
                </select>
            </div>
            
            <div class="auto-refresh">
                <span>自动刷新</span>
                <div class="toggle-switch active" id="auto-refresh-toggle" onclick="toggleAutoRefresh()"></div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="exportLogs()">
                    📥 导出
                </button>
                <button class="btn btn-danger" onclick="clearAllLogs()">
                    🗑️ 清空日志
                </button>
            </div>
        </div>
        
        <!-- Log Table -->
        <div class="log-container">
            <table class="log-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">时间</th>
                        <th style="width: 120px;">Agent</th>
                        <th style="width: 100px;">类型</th>
                        <th style="width: 80px;">方向</th>
                        <th>内容</th>
                        <th style="width: 80px;">耗时</th>
                        <th style="width: 60px;">状态</th>
                    </tr>
                </thead>
                <tbody id="log-table-body">
                    <!-- Dynamic content -->
                </tbody>
            </table>
            
            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-state-icon">📭</div>
                <div>暂无交互日志</div>
                <div style="font-size: 13px; margin-top: 8px;">与Agent交互后将自动记录</div>
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <!-- Dynamic pagination -->
            </div>
        </div>
    </div>
    
    <!-- Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">🔍 交互详情</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script>
        // State
        let currentPage = 1;
        let pageSize = 50;
        let totalLogs = 0;
        let autoRefresh = true;
        let refreshInterval = null;
        let allAgents = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadLogs();
            loadStats();
            startAutoRefresh();
        });
        
        // Load Agents for filter
        async function loadAgents() {
            try {
                const response = await authFetch('/api/agents');
                allAgents = await response.json();
                
                const select = document.getElementById('filter-agent');
                allAgents.forEach(agent => {
                    const option = document.createElement('option');
                    option.value = agent.agent_id || agent.id;
                    option.textContent = `${agent.name} (${agent.agent_id || agent.id})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load agents:', error);
            }
        }
        
        // Load Logs
        async function loadLogs() {
            const agentId = document.getElementById('filter-agent').value;
            const type = document.getElementById('filter-type').value;
            const direction = document.getElementById('filter-direction').value;
            
            try {
                const params = new URLSearchParams({
                    limit: pageSize,
                    offset: (currentPage - 1) * pageSize
                });
                
                if (agentId) params.append('agent_id', agentId);
                if (type) params.append('interaction_type', type);
                if (direction) params.append('direction', direction);
                
                const response = await authFetch(`/api/agent-logs?${params}`);
                const data = await response.json();
                
                totalLogs = data.total;
                renderLogs(data.logs);
                renderPagination();
            } catch (error) {
                console.error('Failed to load logs:', error);
            }
        }
        
        // Render Logs
        function renderLogs(logs) {
            const tbody = document.getElementById('log-table-body');
            const emptyState = document.getElementById('empty-state');
            
            if (logs.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            tbody.innerHTML = logs.map(log => {
                const time = new Date(log.timestamp).toLocaleTimeString('zh-CN');
                const typeClass = log.interaction_type;
                const directionIcon = log.direction === 'outgoing' ? '→' : '←';
                const directionClass = log.direction;
                const statusClass = log.success ? 'success' : 'error';
                const statusIcon = log.success ? '✓' : '✗';
                
                const content = log.content || '(空)';
                const contentPreview = content.length > 100 ? content.substring(0, 100) + '...' : content;
                
                return `
                    <tr onclick="showDetail('${log.id}')">
                        <td class="timestamp">${time}</td>
                        <td>
                            <div class="agent-info">
                                <div class="agent-avatar">${log.agent_name.charAt(0)}</div>
                                <div>
                                    <div class="agent-name">${log.agent_name}</div>
                                    <div class="agent-id">${log.agent_id}</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="log-type ${typeClass}">${getTypeLabel(log.interaction_type)}</span></td>
                        <td><span class="direction ${directionClass}">${directionIcon} ${getDirectionLabel(log.direction)}</span></td>
                        <td><div class="content-preview" title="${escapeHtml(content)}">${escapeHtml(contentPreview)}</div></td>
                        <td class="duration">${log.duration_ms ? log.duration_ms + 'ms' : '-'}</td>
                        <td><span class="status-badge ${statusClass}">${statusIcon}</span></td>
                    </tr>
                `;
            }).join('');
        }
        
        // Render Pagination
        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(totalLogs / pageSize);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = `
                <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span class="page-info">...</span>`;
                }
            }
            
            html += `
                <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                <span class="page-info">共 ${totalLogs} 条</span>
            `;
            
            container.innerHTML = html;
        }
        
        // Go to Page
        function goToPage(page) {
            const totalPages = Math.ceil(totalLogs / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadLogs();
        }
        
        // Load Stats
        async function loadStats() {
            try {
                const response = await authFetch('/api/agent-logs/stats');
                const stats = await response.json();
                
                document.getElementById('stat-total').textContent = stats.total_logs;
                document.getElementById('stat-success').textContent = stats.success_rate + '%';
                document.getElementById('stat-agents').textContent = stats.agents.length;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // Show Detail Modal
        function showDetail(logId) {
            // Find log in current view
            // In real implementation, you'd fetch the specific log
            closeModal();
            document.getElementById('detail-modal').classList.add('active');
        }
        
        // Close Modal
        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }
        
        // Clear All Logs
        async function clearAllLogs() {
            if (!confirm('确定要清空所有交互日志吗？此操作不可恢复。')) return;
            
            try {
                const response = await authFetch('/api/agent-logs', {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert(result.message);
                    loadLogs();
                    loadStats();
                }
            } catch (error) {
                console.error('Failed to clear logs:', error);
                alert('清空失败');
            }
        }
        
        // Export Logs
        async function exportLogs() {
            try {
                const response = await authFetch('/api/agent-logs/export?format=json');
                const blob = await response.blob();
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `agent-logs-${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Failed to export logs:', error);
                alert('导出失败');
            }
        }
        
        // Toggle Auto Refresh
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            document.getElementById('auto-refresh-toggle').classList.toggle('active');
            
            if (autoRefresh) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }
        
        // Start Auto Refresh
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (autoRefresh && currentPage === 1) {
                    loadLogs();
                    loadStats();
                }
            }, 3000);
        }
        
        // Stop Auto Refresh
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }
        
        // Helpers
        function getTypeLabel(type) {
            const labels = {
                'cli': 'CLI',
                'api': 'API',
                'message': '消息',
                'session_send': 'Session'
            };
            return labels[type] || type;
        }
        
        function getDirectionLabel(direction) {
            return direction === 'outgoing' ? '发送' : '接收';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        // Close modal on outside click
        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('detail-modal')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
