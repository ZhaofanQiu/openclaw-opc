<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际工作室 - 动态像素办公室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 4px solid #334155;
            background: #1e293b;
            border-radius: 12px;
        }

        .header-left h1 {
            font-size: 24px;
            color: #667eea;
            text-shadow: 2px 2px 0 #1e293b;
            margin-bottom: 8px;
        }

        .header-left .subtitle {
            font-size: 12px;
            color: #64748b;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            padding: 8px 16px;
            background: #334155;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            background: #475569;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        /* Office Canvas Container */
        .office-container {
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .office-title {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #office-canvas {
            width: 100%;
            height: 500px;
            background: #0f172a;
            border-radius: 8px;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid #334155;
        }

        /* Employee List Panel */
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }

        .panel-header {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header .count {
            background: #334155;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .employee-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .employee-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .employee-item:hover {
            background: #334155;
        }

        .employee-item.selected {
            border-left-color: #667eea;
            background: #334155;
        }

        .employee-avatar-small {
            width: 40px;
            height: 40px;
            background: #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .employee-info {
            flex: 1;
        }

        .employee-name {
            font-weight: 500;
            font-size: 14px;
        }

        .employee-status {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        .employee-location {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.idle { background: #22c55e; }
        .status-dot.working { background: #f59e0b; }
        .status-dot.offline { background: #64748b; }

        /* Activity Log */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            padding: 10px 12px;
            background: #0f172a;
            border-radius: 8px;
            font-size: 13px;
        }

        .activity-time {
            color: #64748b;
            font-size: 11px;
            white-space: nowrap;
        }

        .activity-text {
            color: #e2e8f0;
        }

        .activity-emoji {
            font-size: 16px;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: #1e293b;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            z-index: 1000;
            display: none;
            font-size: 12px;
            max-width: 200px;
        }

        .tooltip-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 4px;
        }

        .tooltip-row {
            color: #94a3b8;
            margin: 2px 0;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .panels {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-text {
            margin-top: 16px;
            color: #64748b;
        }

        .pixel-spinner {
            width: 48px;
            height: 48px;
            background: #667eea;
            animation: pixel-spin 1s steps(8) infinite;
        }

        @keyframes pixel-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
        <div class="pixel-spinner"></div>
        <div class="loading-text">正在初始化星际工作室...</div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <h1>🚀 星际工作室 - 动态像素办公室</h1>
                <div class="subtitle">实时监控员工动态 · 观察员工在办公室内的活动</div>
            </div>
            <div class="nav-links">
                <a href="/dashboard/v2.html">← 返回 Dashboard</a>
                <a href="/dashboard/employees.html">员工管理</a>
                <a href="/dashboard/tasks.html">任务管理</a>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">员工总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-working" style="color: #f59e0b;">0</div>
                <div class="stat-label">工作中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-idle" style="color: #22c55e;">0</div>
                <div class="stat-label">空闲中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-pending">0</div>
                <div class="stat-label">待办任务</div>
            </div>
        </div>

        <!-- Office Canvas -->
        <div class="office-container">
            <div class="office-title">
                🏢 办公室全景
                <span style="font-size: 12px; color: #64748b; margin-left: 12px;">点击员工查看详情</span>
            </div>
            <canvas id="office-canvas">></canvas>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #22c55e;"></div>
                    <span>工位区域</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f59e0b;"></div>
                    <span>休息区</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #3b82f6;"></div>
                    <span>会议室</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #8b5cf6;"></div>
                    <span>茶水间</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #64748b;"></div>
                    <span>走廊</span>
                </div>
            </div>
        </div>

        <!-- Panels -->
        <div class="panels">
            <!-- Employee Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>👥 员工状态</span>
                    <span class="count" id="employee-count">0</span>
                </div>
                <div class="employee-list" id="employee-list">
                    <!-- Dynamic content -->
                </div>
            </div>

            <!-- Activity Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>📋 活动日志</span>
                    <span class="count" id="activity-count">最新</span>
                </div>
                <div class="activity-list" id="activity-list">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltip-title"></div>
        <div class="tooltip-row" id="tooltip-status"></div>
        <div class="tooltip-row" id="tooltip-location"></div>
        <div class="tooltip-row" id="tooltip-task"></div>
    </div>

    <script>
        // ============ Office Simulation System ============
        
        const API_BASE = '/api';
        const CANVAS_WIDTH = 1200;
        const CANVAS_HEIGHT = 500;
        
        // Office Zones (x, y, width, height, color, name)
        const ZONES = [
            { id: 'desks', x: 50, y: 50, w: 500, h: 200, color: '#22c55e20', border: '#22c55e', name: '工位区' },
            { id: 'lounge', x: 600, y: 50, w: 250, h: 200, color: '#f59e0b20', border: '#f59e0b', name: '休息区' },
            { id: 'meeting', x: 900, y: 50, w: 250, h: 200, color: '#3b82f620', border: '#3b82f6', name: '会议室' },
            { id: 'pantry', x: 50, y: 300, w: 300, h: 150, color: '#8b5cf620', border: '#8b5cf6', name: '茶水间' },
            { id: 'corridor', x: 400, y: 300, w: 750, h: 150, color: '#64748b15', border: '#64748b', name: '走廊' }
        ];

        // Zone centers for navigation
        const ZONE_CENTERS = {
            desks: [{ x: 100, y: 100 }, { x: 200, y: 100 }, { x: 300, y: 100 }, { x: 400, y: 100 },
                    { x: 100, y: 180 }, { x: 200, y: 180 }, { x: 300, y: 180 }, { x: 400, y: 180 }],
            lounge: [{ x: 650, y: 100 }, { x: 750, y: 100 }, { x: 650, y: 180 }, { x: 750, y: 180 }],
            meeting: [{ x: 950, y: 100 }, { x: 1050, y: 100 }, { x: 950, y: 180 }, { x: 1050, y: 180 }],
            pantry: [{ x: 100, y: 350 }, { x: 200, y: 350 }, { x: 100, y: 400 }, { x: 200, y: 400 }],
            corridor: [{ x: 500, y: 350 }, { x: 650, y: 350 }, { x: 800, y: 350 }, { x: 950, y: 350 }]
        };

        // Employee sprites
        class EmployeeSprite {
            constructor(employee) {
                this.id = employee.id;
                this.name = employee.name;
                this.emoji = employee.emoji || '🤖';
                this.status = employee.status;
                this.positionLevel = employee.position_level;
                this.currentTaskId = employee.current_task_id;
                
                // Position
                this.x = 100 + Math.random() * 1000;
                this.y = 100 + Math.random() * 300;
                this.targetX = this.x;
                this.targetY = this.y;
                this.speed = 1 + Math.random() * 0.5;
                
                // Animation
                this.frame = 0;
                this.direction = 'right'; // right, left, up, down
                this.isMoving = false;
                this.state = 'idle'; // idle, walking, working, resting
                this.stateTimer = 0;
                
                // Assign initial zone
                this.currentZone = this.getRandomZoneForStatus();
                this.moveToZone(this.currentZone);
            }
            
            getRandomZoneForStatus() {
                if (this.status === 'working') {
                    return Math.random() > 0.7 ? 'meeting' : 'desks';
                } else if (this.status === 'idle') {
                    const zones = ['desks', 'lounge', 'pantry', 'corridor'];
                    return zones[Math.floor(Math.random() * zones.length)];
                }
                return 'corridor';
            }
            
            moveToZone(zoneId) {
                const centers = ZONE_CENTERS[zoneId];
                if (centers) {
                    const spot = centers[Math.floor(Math.random() * centers.length)];
                    this.targetX = spot.x + (Math.random() - 0.5) * 40;
                    this.targetY = spot.y + (Math.random() - 0.5) * 40;
                    this.currentZone = zoneId;
                }
            }
            
            update(deltaTime) {
                // State machine
                this.stateTimer -= deltaTime;
                
                if (this.stateTimer <= 0) {
                    this.decideNextAction();
                }
                
                // Movement
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > 5) {
                    this.isMoving = true;
                    this.state = 'walking';
                    
                    // Determine direction
                    if (Math.abs(dx) > Math.abs(dy)) {
                        this.direction = dx > 0 ? 'right' : 'left';
                    } else {
                        this.direction = dy > 0 ? 'down' : 'up';
                    }
                    
                    // Move
                    const moveX = (dx / distance) * this.speed * deltaTime * 0.05;
                    const moveY = (dy / distance) * this.speed * deltaTime * 0.05;
                    this.x += moveX;
                    this.y += moveY;
                    
                    // Animation frame
                    this.frame += deltaTime * 0.01;
                } else {
                    this.isMoving = false;
                    this.x = this.targetX;
                    this.y = this.targetY;
                    
                    if (this.status === 'working') {
                        this.state = 'working';
                    } else {
                        this.state = 'idle';
                    }
                }
            }
            
            decideNextAction() {
                // Random duration for current state
                this.stateTimer = 3000 + Math.random() * 5000;
                
                if (this.status === 'working') {
                    // Working employees mostly stay at desks or go to meetings
                    const rand = Math.random();
                    if (rand < 0.7) {
                        this.moveToZone('desks');
                    } else if (rand < 0.9) {
                        this.moveToZone('meeting');
                    } else {
                        this.moveToZone('pantry'); // Coffee break
                    }
                } else {
                    // Idle employees wander around
                    const zones = ['desks', 'lounge', 'pantry', 'corridor'];
                    const zone = zones[Math.floor(Math.random() * zones.length)];
                    this.moveToZone(zone);
                }
            }
            
            draw(ctx) {
                const bounce = this.isMoving ? Math.sin(this.frame) * 2 : 0;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + 20, 12, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Character body (pixel style)
                const bodyY = this.y - 15 + bounce;
                
                // Body color based on position level
                const colors = ['#64748b', '#60a5fa', '#a78bfa', '#f59e0b', '#ef4444'];
                const bodyColor = colors[this.positionLevel - 1] || colors[0];
                
                // Pixel body
                ctx.fillStyle = bodyColor;
                ctx.fillRect(this.x - 10, bodyY, 20, 24);
                
                // Head
                ctx.fillStyle = '#f4c2a1';
                ctx.fillRect(this.x - 8, bodyY - 14, 16, 14);
                
                // Eyes (direction)
                ctx.fillStyle = '#333';
                if (this.direction === 'right') {
                    ctx.fillRect(this.x + 2, bodyY - 10, 3, 3);
                } else if (this.direction === 'left') {
                    ctx.fillRect(this.x - 5, bodyY - 10, 3, 3);
                } else {
                    ctx.fillRect(this.x - 5, bodyY - 10, 3, 3);
                    ctx.fillRect(this.x + 2, bodyY - 10, 3, 3);
                }
                
                // Status indicator
                const statusColors = { idle: '#22c55e', working: '#f59e0b', offline: '#64748b' };
                ctx.fillStyle = statusColors[this.status] || '#64748b';
                ctx.fillRect(this.x + 6, bodyY - 16, 6, 6);
                
                // Emoji above head
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.emoji, this.x, bodyY - 20);
                
                // Working indicator
                if (this.state === 'working') {
                    ctx.fillStyle = '#f59e0b';
                    ctx.font = '10px Arial';
                    ctx.fillText('💻', this.x + 15, bodyY + 5);
                }
            }
            
            isPointInside(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) < 20;
            }
        }

        // ============ Main Application ============
        
        let canvas, ctx;
        let employees = [];
        let selectedEmployee = null;
        let lastTime = 0;
        let activities = [];
        
        function initCanvas() {
            canvas = document.getElementById('office-canvas');
            ctx = canvas.getContext('2d');
            
            // Set canvas size
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            
            // Mouse events
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('mousemove', handleCanvasMove);
            
            // Start animation loop
            requestAnimationFrame(animate);
        }
        
        function drawOffice() {
            // Clear canvas
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw grid
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            for (let x = 0; x < CANVAS_WIDTH; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < CANVAS_HEIGHT; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }
            
            // Draw zones
            ZONES.forEach(zone => {
                // Zone background
                ctx.fillStyle = zone.color;
                ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
                
                // Zone border
                ctx.strokeStyle = zone.border;
                ctx.lineWidth = 2;
                ctx.strokeRect(zone.x, zone.y, zone.w, zone.h);
                
                // Zone label
                ctx.fillStyle = zone.border;
                ctx.font = 'bold 14px Courier New';
                ctx.textAlign = 'left';
                ctx.fillText(zone.name, zone.x + 10, zone.y + 25);
                
                // Zone furniture/icons
                drawZoneFurniture(zone);
            });
        }
        
        function drawZoneFurniture(zone) {
            ctx.fillStyle = zone.border + '40';
            
            switch(zone.id) {
                case 'desks':
                    // Draw desks
                    for (let x = zone.x + 30; x < zone.x + zone.w - 30; x += 80) {
                        for (let y = zone.y + 40; y < zone.y + zone.h - 30; y += 60) {
                            ctx.fillRect(x, y, 50, 30);
                            ctx.strokeStyle = zone.border;
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x, y, 50, 30);
                            // Chair
                            ctx.fillRect(x + 15, y + 32, 20, 8);
                        }
                    }
                    break;
                    
                case 'lounge':
                    // Draw sofas
                    ctx.fillRect(zone.x + 40, zone.y + 60, 60, 30);
                    ctx.fillRect(zone.x + 150, zone.y + 60, 60, 30);
                    // Coffee table
                    ctx.fillStyle = '#475569';
                    ctx.fillRect(zone.x + 100, zone.y + 110, 50, 25);
                    break;
                    
                case 'meeting':
                    // Draw conference table
                    ctx.fillRect(zone.x + 50, zone.y + 70, 150, 60);
                    // Chairs around table
                    ctx.fillStyle = zone.border + '60';
                    for (let x = zone.x + 30; x < zone.x + zone.w - 20; x += 40) {
                        ctx.fillRect(x, zone.y + 50, 20, 15);
                        ctx.fillRect(x, zone.y + 135, 20, 15);
                    }
                    break;
                    
                case 'pantry':
                    // Draw kitchen counter
                    ctx.fillRect(zone.x + 20, zone.y + 40, 80, 30);
                    // Fridge
                    ctx.fillRect(zone.x + 20, zone.y + 90, 40, 50);
                    break;
                    
                case 'corridor':
                    // Plants
                    ctx.fillStyle = '#22c55e40';
                    ctx.fillRect(zone.x + 50, zone.y + 50, 20, 20);
                    ctx.fillRect(zone.x + 200, zone.y + 100, 20, 20);
                    ctx.fillRect(zone.x + 400, zone.y + 50, 20, 20);
                    ctx.fillRect(zone.x + 600, y + 100, 20, 20);
                    break;
            }
        }
        
        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            // Draw office background
            drawOffice();
            
            // Update and draw employees
            employees.forEach(emp => {
                emp.update(deltaTime);
                emp.draw(ctx);
            });
            
            // Highlight selected employee
            if (selectedEmployee) {
                const emp = employees.find(e => e.id === selectedEmployee);
                if (emp) {
                    ctx.strokeStyle = '#667eea';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(emp.x, emp.y, 30, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Draw name tag
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(emp.x - 40, emp.y - 55, 80, 20);
                    ctx.strokeStyle = '#667eea';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(emp.x - 40, emp.y - 55, 80, 20);
                    ctx.fillStyle = '#e2e8f0';
                    ctx.font = '11px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(emp.name, emp.x, emp.y - 42);
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);
            const y = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);
            
            // Find clicked employee
            const clickedEmp = employees.find(emp => emp.isPointInside(x, y));
            
            if (clickedEmp) {
                selectedEmployee = clickedEmp.id;
                updateEmployeeList();
                addActivity(`${clickedEmp.name} 被选中`, '👆');
            } else {
                selectedEmployee = null;
                updateEmployeeList();
            }
        }
        
        function handleCanvasMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);
            const y = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);
            
            const hoveredEmp = employees.find(emp => emp.isPointInside(x, y));
            
            if (hoveredEmp) {
                canvas.style.cursor = 'pointer';
                showTooltip(e, hoveredEmp);
            } else {
                canvas.style.cursor = 'crosshair';
                hideTooltip();
            }
        }
        
        function showTooltip(e, emp) {
            const tooltip = document.getElementById('tooltip');
            const zone = ZONES.find(z => z.id === emp.currentZone);
            
            document.getElementById('tooltip-title').textContent = `${emp.emoji} ${emp.name}`;
            document.getElementById('tooltip-status').textContent = `状态: ${emp.status === 'working' ? '工作中' : '空闲'}`;
            document.getElementById('tooltip-location').textContent = `位置: ${zone?.name || '未知'}`;
            document.getElementById('tooltip-task').textContent = emp.currentTaskId ? `任务: ${emp.currentTaskId.slice(0, 8)}...` : '无任务';
            
            tooltip.style.display = 'block';
            tooltip.style.left = e.pageX + 15 + 'px';
            tooltip.style.top = e.pageY + 15 + 'px';
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }
        
        // ============ Data Management ============
        
        async function loadData() {
            try {
                const [agentsRes, tasksRes] = await Promise.all([
                    fetch(`${API_BASE}/agents`),
                    fetch(`${API_BASE}/tasks`)
                ]);
                
                if (!agentsRes.ok || !tasksRes.ok) {
                    throw new Error('Failed to load data');
                }
                
                const agents = await agentsRes.json();
                const tasks = await tasksRes.json();
                
                // Create/update employee sprites
                const newEmployees = [];
                agents.agents.forEach(agent => {
                    const existing = employees.find(e => e.id === agent.id);
                    if (existing) {
                        // Update existing
                        existing.status = agent.status;
                        existing.currentTaskId = agent.current_task_id;
                        // If status changed, might want to move
                        if (existing.status !== agent.status) {
                            existing.currentZone = existing.getRandomZoneForStatus();
                            existing.moveToZone(existing.currentZone);
                            addActivity(`${agent.name} 状态变为 ${agent.status === 'working' ? '工作中' : '空闲'}`, 
                                agent.status === 'working' ? '💻' : '☕');
                        }
                        newEmployees.push(existing);
                    } else {
                        // Create new
                        const sprite = new EmployeeSprite(agent);
                        newEmployees.push(sprite);
                        addActivity(`新员工 ${agent.name} 加入办公室`, '🎉');
                    }
                });
                
                employees = newEmployees;
                
                // Update stats
                document.getElementById('stat-total').textContent = agents.total;
                document.getElementById('stat-working').textContent = 
                    agents.agents.filter(a => a.status === 'working').length;
                document.getElementById('stat-idle').textContent = 
                    agents.agents.filter(a => a.status === 'idle').length;
                document.getElementById('stat-pending').textContent = 
                    tasks.tasks.filter(t => t.status === 'pending').length;
                
                updateEmployeeList();
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }
        
        function updateEmployeeList() {
            const container = document.getElementById('employee-list');
            document.getElementById('employee-count').textContent = employees.length;
            
            if (employees.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">暂无员工</div>';
                return;
            }
            
            container.innerHTML = employees.map(emp => {
                const zone = ZONES.find(z => z.id === emp.currentZone);
                const isSelected = emp.id === selectedEmployee;
                
                return `
                    <div class="employee-item ${isSelected ? 'selected' : ''}" onclick="selectEmployee('${emp.id}')">
                        <div class="status-dot ${emp.status}"></div>
                        <div class="employee-avatar-small">${emp.emoji}</div>
                        <div class="employee-info">
                            <div class="employee-name">${emp.name}</div>
                            <div class="employee-status">${emp.status === 'working' ? '💻 工作中' : '☕ 空闲'}</div>
                            <div class="employee-location">📍 ${zone?.name || '未知'}</div>
                        </div>
                        <a href="/dashboard/employee-detail.html?id=${emp.id}" class="btn btn-secondary btn-sm" 
                           onclick="event.stopPropagation()">详情</a>
                    </div>
                `;
            }).join('');
        }
        
        function selectEmployee(id) {
            selectedEmployee = id;
            updateEmployeeList();
        }
        
        function addActivity(text, emoji = '📝') {
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            activities.unshift({ time, text, emoji });
            
            // Keep only last 20
            if (activities.length > 20) {
                activities = activities.slice(0, 20);
            }
            
            updateActivityList();
        }
        
        function updateActivityList() {
            const container = document.getElementById('activity-list');
            
            if (activities.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">暂无活动</div>';
                return;
            }
            
            container.innerHTML = activities.map(act => `
                <div class="activity-item">
                    <span class="activity-emoji">${act.emoji}</span>
                    <span class="activity-time">${act.time}</span>
                    <span class="activity-text">${act.text}</span>
                </div>
            `).join('');
        }
        
        // ============ Initialization ============
        
        function init() {
            initCanvas();
            loadData();
            
            // Auto refresh data every 10 seconds
            setInterval(loadData, 10000);
            
            // Random activities
            setInterval(() => {
                if (employees.length > 0 && Math.random() > 0.7) {
                    const emp = employees[Math.floor(Math.random() * employees.length)];
                    const messages = [
                        `${emp.name} 正在喝咖啡`,
                        `${emp.name} 查看任务进度`,
                        `${emp.name} 与同事交流`,
                        `${emp.name} 在思考方案`,
                        `${emp.name} 正在写代码`,
                        `${emp.name} 查看文档`
                    ];
                    const msg = messages[Math.floor(Math.random() * messages.length)];
                    const emoji = ['☕', '💻', '💭', '📝', '🔍'][Math.floor(Math.random() * 5)];
                    addActivity(msg, emoji);
                }
            }, 5000);
        }
        
        // Start
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
