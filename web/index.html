<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际工作室 - OPC Dashboard</title>
    <script src="auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a4a;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.1);
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        .stat-unit {
            font-size: 14px;
            color: #888;
            margin-left: 4px;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }

        .stat-change.positive {
            color: #4ade80;
        }

        .stat-change.negative {
            color: #f87171;
        }

        /* Main Content */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Section Cards */
        .section-card {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            font-size: 20px;
        }

        .badge {
            background: #667eea;
            color: #fff;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .section-content {
            padding: 0;
            max-height: 500px;
            overflow-y: auto;
        }

        /* Agent List */
        .agent-item {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.2s;
        }

        .agent-item:last-child {
            border-bottom: none;
        }

        .agent-item:hover {
            background: #252542;
        }

        .agent-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: #2a2a4a;
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .agent-role {
            font-size: 13px;
            color: #888;
        }

        .agent-budget {
            text-align: right;
        }

        .budget-bar {
            width: 120px;
            height: 6px;
            background: #2a2a4a;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .budget-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .budget-fill.high {
            background: #4ade80;
        }

        .budget-fill.medium {
            background: #fbbf24;
        }

        .budget-fill.low {
            background: #f87171;
        }

        .budget-text {
            font-size: 12px;
            color: #888;
        }

        .agent-mood {
            font-size: 24px;
            margin-left: 8px;
        }

        /* Task List */
        .task-item {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a4a;
            transition: background 0.2s;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #252542;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .task-title {
            font-weight: 600;
            flex: 1;
        }

        .task-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .task-status.pending {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .task-status.assigned {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .task-status.completed {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .task-status.fused {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .task-desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #666;
        }

        .task-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a4a;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 40px;
            color: #f87171;
        }

        /* Empty State */
        .empty {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Refresh Button */
        .refresh-btn {
            background: #2a2a4a;
            border: none;
            color: #888;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #3a3a5a;
            color: #fff;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Notification Center */
        .notification-btn {
            position: relative;
            background: #2a2a4a;
            border: none;
            color: #888;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .notification-btn:hover {
            background: #3a3a5a;
            color: #fff;
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #f87171;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .notification-badge.hidden {
            display: none;
        }

        .notification-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 360px;
            max-height: 500px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 16px;
            z-index: 100;
            display: none;
            overflow-y: auto;
        }

        .notification-panel.visible {
            display: block;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a4a;
        }

        .notification-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .notification-item:hover {
            background: #252542;
        }

        .notification-item.unread {
            background: rgba(102, 126, 234, 0.1);
            border-left: 3px solid #667eea;
        }

        .notification-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 12px;
            color: #888;
            line-height: 1.4;
        }

        .notification-time {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        /* Assign Button */
        .assign-btn {
            background: #667eea;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        .assign-btn:hover {
            background: #5a6fd6;
        }

        .assign-btn:disabled {
            background: #2a2a4a;
            color: #666;
            cursor: not-allowed;
        }

        /* Assign Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-content {
            margin-bottom: 20px;
        }

        .agent-select {
            width: 100%;
            background: #252542;
            border: 1px solid #2a2a4a;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .agent-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-btn.primary {
            background: #667eea;
            color: #fff;
        }

        .modal-btn.secondary {
            background: #2a2a4a;
            color: #888;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Config Panel */
        .config-panel {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            padding: 20px 24px;
            margin-bottom: 24px;
        }

        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .config-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        .config-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .config-field label {
            font-size: 12px;
            color: #888;
        }

        .config-field input {
            background: #252542;
            border: 1px solid #2a2a4a;
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .config-field input:focus {
            outline: none;
            border-color: #667eea;
        }

        .save-config-btn {
            background: #667eea;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 16px;
        }

        .save-config-btn:hover {
            background: #5a6fd6;
        }

        /* Overdue Warning */
        .overdue-alert {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .overdue-alert.hidden {
            display: none;
        }

        .overdue-icon {
            font-size: 24px;
        }

        .overdue-text {
            flex: 1;
        }

        .overdue-count {
            font-weight: 700;
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🚀 星际工作室</h1>
            <p class="subtitle">
                <span class="status-indicator">
                    <span class="status-dot"></span>
                    系统运行中
                </span>
                <span style="margin-left: 16px; color: #666;">|</span>
                <span style="margin-left: 16px;">实时更新中...</span>
                <span style="margin-left: 16px; color: #666;">|</span>
                <a href="/pixel-office" style="margin-left: 16px; color: #667eea; text-decoration: none;">🏢 像素办公室 →</a>
            </p>
        </header>

        <!-- Overdue Alert -->
        <div class="overdue-alert hidden" id="overdue-alert">
            <span class="overdue-icon">⏰</span>
            <div class="overdue-text">
                <span class="overdue-count" id="overdue-count">0</span> 个任务已超时
                <span style="color: #888; font-size: 13px;">（超过设定时间未开始）</span>
            </div>
            <button class="refresh-btn" onclick="checkOverdueTasks()">检查任务</button>
        </div>

        <!-- Config Panel -->
        <div class="config-panel">
            <div class="config-header">
                <div class="config-title">
                    <span>⚙️</span>
                    系统配置
                </div>
                <button class="refresh-btn" onclick="toggleConfig()">收起/展开</button>
            </div>
            <div class="config-form" id="config-form">
                <div class="config-field">
                    <label>任务超时时间（分钟）</label>
                    <input type="number" id="config-timeout" min="1" max="480" value="30">
                </div>
                <div class="config-field">
                    <label>Token 换算比例（tokens/OC币）</label>
                    <input type="number" id="config-token-rate" min="1" value="100">
                </div>
                <div class="config-field">
                    <label>预算警告阈值（%）</label>
                    <input type="number" id="config-warning" min="0" max="100" value="80">
                </div>
                <div class="config-field">
                    <label>自动分配策略</label>
                    <input type="text" id="config-strategy" value="budget" placeholder="budget/workload/combined">
                </div>
                <button class="save-config-btn" onclick="saveConfig()">保存配置</button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">公司总预算</div>
                <div class="stat-value" id="total-budget">--<span class="stat-unit">OC币</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">已使用</div>
                <div class="stat-value" id="used-budget">--<span class="stat-unit">OC币</span></div>
                <div class="stat-change negative" id="usage-percent">--%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">剩余预算</div>
                <div class="stat-value" id="remaining-budget">--<span class="stat-unit">OC币</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">员工数量</div>
                <div class="stat-value" id="agent-count">--<span class="stat-unit">人</span></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Agents Section -->
            <div class="section-card">
                <div class="section-header">
                    <div class="section-title">
                        <span class="section-icon">👥</span>
                        员工列表
                    </div>
                    <span class="badge" id="agent-badge">0</span>
                </div>
                <div class="section-content" id="agents-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>

            <!-- Tasks Section -->
            <div class="section-card">
                <div class="section-header">
                    <div class="section-title">
                        <span class="section-icon">📋</span>
                        任务列表
                    </div>
                    <button class="refresh-btn" onclick="loadData()" id="refresh-btn">🔄 刷新</button>
                </div>
                <div class="section-content" id="tasks-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Button + Logout -->
    <div style="position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;">
        <button onclick="Auth.logout()" style="background: #2a2a4a; border: none; color: #888; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s;">🚪 登出</button>
        <button class="notification-btn" onclick="toggleNotifications()">
            <span>🔔</span>
            <span id="notification-btn-text">通知</span>
            <span class="notification-badge hidden" id="notification-badge">0</span>
        </button>
    </div>

    <!-- Notification Panel -->
    <div class="notification-panel" id="notification-panel">
        <div class="notification-header">
            <span style="font-weight: 600;">通知</span>
            <button class="refresh-btn" onclick="markAllNotificationsRead()">全部已读</button>
        </div>
        <div id="notification-list">
            <div class="empty">暂无通知</div>
        </div>
    </div>

    <!-- Assign Modal -->
    <div class="modal-overlay" id="assign-modal">
        <div class="modal">
            <div class="modal-title">手动分配任务</div>
            <div class="modal-content">
                <p style="color: #888; font-size: 13px; margin-bottom: 12px;">选择员工：</p>
                <select class="agent-select" id="assign-agent-select">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeAssignModal()">取消</button>
                <button class="modal-btn primary" onclick="confirmAssign()">确认分配</button>
            </div>
        </div>
    </div>

    <!-- Bind Agent Modal -->
    <div class="modal-overlay" id="bind-modal">
        <div class="modal">
            <div class="modal-title">绑定 OpenClaw Agent</div>
            <div class="modal-content">
                <p style="color: #888; font-size: 13px; margin-bottom: 8px;">员工：<span id="bind-employee-name" style="color: #fff;"></span></p>
                <p style="color: #888; font-size: 13px; margin-bottom: 12px;">选择要绑定的 OpenClaw Agent：</p>
                <select class="agent-select" id="bind-agent-select">
                    <option value="">加载可用Agent...</option>
                </select>
                <p style="color: #666; font-size: 12px; margin-top: 12px;">
                    💡 提示：如果没有可用Agent，需要先在 OpenClaw 配置中创建 Agent，或使用"自动创建"功能。
                </p>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeBindModal()">取消</button>
                <button class="modal-btn" style="background: #f59e0b;" onclick="autoCreateAgent()">自动创建</button>
                <button class="modal-btn primary" onclick="confirmBind()">确认绑定</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080'  // Development
            : '';  // Production (same origin via nginx proxy)
        const REFRESH_INTERVAL = 5000; // 5 seconds

        // Format number
        function formatNumber(num) {
            if (num === undefined || num === null) return '0';
            return num.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
        }

        // Get budget bar color class
        function getBudgetClass(percentage) {
            if (percentage > 60) return 'high';
            if (percentage > 30) return 'medium';
            return 'low';
        }

        // Load company budget
        async function loadCompanyBudget() {
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/budget/company`);
                if (!response.ok) throw new Error('Failed to load budget');
                
                const data = await response.json();
                
                document.getElementById('total-budget').innerHTML = 
                    formatNumber(data.total_budget) + '<span class="stat-unit">OC币</span>';
                document.getElementById('used-budget').innerHTML = 
                    formatNumber(data.total_used) + '<span class="stat-unit">OC币</span>';
                document.getElementById('remaining-budget').innerHTML = 
                    formatNumber(data.total_remaining) + '<span class="stat-unit">OC币</span>';
                document.getElementById('usage-percent').textContent = 
                    data.usage_percentage.toFixed(1) + '%';
            } catch (error) {
                console.error('Error loading budget:', error);
            }
        }

        // Load agents
        async function loadAgents() {
            const container = document.getElementById('agents-list');
            
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/agents`);
                if (!response.ok) throw new Error('Failed to load agents');
                
                const agents = await response.json();
                document.getElementById('agent-badge').textContent = agents.length;
                document.getElementById('agent-count').innerHTML = 
                    agents.length + '<span class="stat-unit">人</span>';
                
                if (agents.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <div class="empty-icon">👤</div>
                            <p>暂无员工</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = agents.map(agent => {
                    const totalBudget = agent.total_budget || 10000; // Default if not provided
                    const budgetPercent = totalBudget > 0 ? (agent.remaining_budget / totalBudget) * 100 : 0;
                    const budgetClass = getBudgetClass(budgetPercent);
                    const isBound = agent.is_bound === 'true';
                    const boundBadge = isBound 
                        ? `<span style="background:#4ade80;color:#000;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;">已绑定 · ${agent.agent_id}</span>`
                        : `<span style="background:#f87171;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;">未绑定</span>`;
                    const bindButton = !isBound 
                        ? `<button class="assign-btn" onclick="openBindModal('${agent.id}', '${agent.name}')">绑定Agent</button>`
                        : '';
                    
                    return `
                        <div class="agent-item">
                            <div class="agent-avatar">${agent.emoji}</div>
                            <div class="agent-info">
                                <div class="agent-name">${agent.name}${boundBadge}</div>
                                <div class="agent-role">${agent.position_title} · ${agent.status}${bindButton}</div>
                            </div>
                            <div class="agent-budget">
                                <div class="budget-bar">
                                    <div class="budget-fill ${budgetClass}" style="width: ${budgetPercent}%"></div>
                                </div>
                                <div class="budget-text">${formatNumber(agent.remaining_budget)} / ${formatNumber(totalBudget)} OC币</div>
                            </div>
                            <div class="agent-mood">${agent.mood_emoji}</div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading agents:', error);
                container.innerHTML = `
                    <div class="error">
                        <p>❌ 加载失败</p>
                        <p style="font-size: 12px; margin-top: 8px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load tasks
        async function loadTasks() {
            const container = document.getElementById('tasks-list');
            
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/tasks`);
                if (!response.ok) throw new Error('Failed to load tasks');
                
                const tasks = await response.json();
                
                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <div class="empty-icon">📭</div>
                            <p>暂无任务</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = tasks.map(task => {
                    const statusClass = task.status;
                    const statusText = {
                        'pending': '待分配',
                        'assigned': '进行中',
                        'completed': '已完成',
                        'fused': '已熔断'
                    }[task.status] || task.status;
                    
                    const assignedTo = task.assigned_to ? `分配给: ${task.assigned_to}` : '未分配';
                    const canAssign = task.status === 'pending';
                    
                    return `
                        <div class="task-item">
                            <div class="task-header">
                                <div class="task-title">${task.title}</div>
                                <span class="task-status ${statusClass}">${statusText}</span>
                                ${canAssign ? `<button class="assign-btn" onclick="openAssignModal('${task.id}')">分配</button>` : ''}
                            </div>
                            <div class="task-desc">${task.description || '暂无描述'}</div>
                            <div class="task-meta">
                                <span>💰 ${task.estimated_cost} OC币</span>
                                <span>👤 ${assignedTo}</span>
                                <span>📅 ${new Date(task.created_at).toLocaleDateString('zh-CN')}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading tasks:', error);
                container.innerHTML = `
                    <div class="error">
                        <p>❌ 加载失败</p>
                        <p style="font-size: 12px; margin-top: 8px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load all data
        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 刷新中...';
            
            await Promise.all([
                loadCompanyBudget(),
                loadAgents(),
                loadTasks(),
                loadPartnerHealth()
            ]);
            
            btn.disabled = false;
            btn.textContent = '🔄 刷新';
        }

        // Load Partner health status
        async function loadPartnerHealth() {
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/agents/partner/health?partner_id=main`);
                if (response.ok) {
                    const data = await response.json();
                    const indicator = document.querySelector('.status-indicator');
                    
                    if (data.is_online) {
                        indicator.innerHTML = '<span class="status-dot"></span>Partner 在线';
                        indicator.style.color = '#4ade80';
                    } else {
                        indicator.innerHTML = '<span class="status-dot" style="background:#f87171"></span>Partner 离线';
                        indicator.style.color = '#f87171';
                    }
                }
            } catch (error) {
                console.error('Error loading partner health:', error);
            }
        }

        // Load system config
        async function loadConfig() {
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/config`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('config-timeout').value = data.task_timeout_minutes;
                    document.getElementById('config-token-rate').value = data.token_to_oc_rate;
                    document.getElementById('config-warning').value = data.warning_threshold;
                    document.getElementById('config-strategy').value = data.default_strategy;
                }
            } catch (error) {
                console.error('Error loading config:', error);
            }
        }

        // Save config
        async function saveConfig() {
            const btn = document.querySelector('.save-config-btn');
            btn.textContent = '保存中...';
            btn.disabled = true;

            const updates = {
                task_timeout_minutes: parseInt(document.getElementById('config-timeout').value),
                token_to_oc_rate: parseInt(document.getElementById('config-token-rate').value),
                warning_threshold: parseFloat(document.getElementById('config-warning').value),
                default_strategy: document.getElementById('config-strategy').value
            };

            try {
                const response = await Auth.authFetch(`${API_BASE}/api/config`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });

                if (response.ok) {
                    btn.textContent = '✓ 已保存';
                    setTimeout(() => {
                        btn.textContent = '保存配置';
                        btn.disabled = false;
                    }, 2000);
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                console.error('Error saving config:', error);
                btn.textContent = '保存失败';
                btn.disabled = false;
            }
        }

        // Toggle config panel
        function toggleConfig() {
            const form = document.getElementById('config-form');
            form.style.display = form.style.display === 'none' ? 'grid' : 'none';
        }

        // Check overdue tasks
        async function checkOverdueTasks() {
            try {
                // First, run check
                await Auth.authFetch(`${API_BASE}/api/monitor/check`, { method: 'POST' });
                
                // Then get overdue list
                const response = await Auth.authFetch(`${API_BASE}/api/monitor/overdue`);
                if (response.ok) {
                    const data = await response.json();
                    const alert = document.getElementById('overdue-alert');
                    const count = document.getElementById('overdue-count');
                    
                    count.textContent = data.overdue_count;
                    
                    if (data.overdue_count > 0) {
                        alert.classList.remove('hidden');
                    } else {
                        alert.classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error('Error checking overdue tasks:', error);
            }
        }

        // Initial load
        loadData();
        loadConfig();
        checkOverdueTasks();
        loadNotifications();

        // Auto refresh
        setInterval(() => {
            loadData();
            checkOverdueTasks();
            loadNotifications();
        }, REFRESH_INTERVAL);

        // Notification system
        let currentNotifications = [];
        let currentAssignTaskId = null;

        async function loadNotifications() {
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/notifications`);
                if (!response.ok) return;
                
                const data = await response.json();
                currentNotifications = data.notifications;
                
                // Update badge
                const badge = document.getElementById('notification-badge');
                if (data.unread_count > 0) {
                    badge.textContent = data.unread_count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
                
                // Update list
                const list = document.getElementById('notification-list');
                if (currentNotifications.length === 0) {
                    list.innerHTML = '<div class="empty">暂无通知</div>';
                    return;
                }
                
                list.innerHTML = currentNotifications.map(n => `
                    <div class="notification-item ${n.is_read ? '' : 'unread'}" onclick="markNotificationRead(${n.id})">
                        <div class="notification-title">${n.title}</div>
                        <div class="notification-message">${n.message}</div>
                        <div class="notification-time">${new Date(n.created_at).toLocaleString('zh-CN')}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading notifications:', error);
            }
        }

        function toggleNotifications() {
            const panel = document.getElementById('notification-panel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                loadNotifications();
            }
        }

        async function markNotificationRead(id) {
            try {
                await Auth.authFetch(`${API_BASE}/api/notifications/${id}/read`, { method: 'POST' });
                loadNotifications();
            } catch (error) {
                console.error('Error marking notification read:', error);
            }
        }

        async function markAllNotificationsRead() {
            try {
                await Auth.authFetch(`${API_BASE}/api/notifications/read-all`, { method: 'POST' });
                loadNotifications();
            } catch (error) {
                console.error('Error marking all notifications read:', error);
            }
        }

        // Manual assignment
        function openAssignModal(taskId) {
            currentAssignTaskId = taskId;
            loadAvailableAgents();
            document.getElementById('assign-modal').classList.add('visible');
        }

        function closeAssignModal() {
            document.getElementById('assign-modal').classList.remove('visible');
            currentAssignTaskId = null;
        }

        async function loadAvailableAgents() {
            const select = document.getElementById('assign-agent-select');
            select.innerHTML = '<option value="">加载中...</option>';
            
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/agents?available_only=true`);
                if (!response.ok) throw new Error('Failed to load agents');
                
                const agents = await response.json();
                if (agents.length === 0) {
                    select.innerHTML = '<option value="">暂无可用员工</option>';
                    return;
                }
                
                select.innerHTML = agents.map(a => 
                    `<option value="${a.agent_id}">${a.name} (${a.position_title})</option>`
                ).join('');
            } catch (error) {
                console.error('Error loading available agents:', error);
                select.innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function confirmAssign() {
            const select = document.getElementById('assign-agent-select');
            const agentId = select.value;
            
            if (!agentId || !currentAssignTaskId) {
                alert('请选择一个员工');
                return;
            }
            
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/tasks/${currentAssignTaskId}/assign`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId })
                });
                
                if (response.ok) {
                    closeAssignModal();
                    loadData();
                    loadNotifications();
                    alert('任务分配成功！');
                } else {
                    const error = await response.json();
                    alert('分配失败: ' + (error.detail || '未知错误'));
                }
            } catch (error) {
                console.error('Error assigning task:', error);
                alert('分配失败，请稍后重试');
            }
        }

        // Bind Agent Modal
        let currentBindEmployeeId = null;
        let currentBindEmployeeName = null;

        function openBindModal(employeeId, employeeName) {
            currentBindEmployeeId = employeeId;
            currentBindEmployeeName = employeeName;
            document.getElementById('bind-employee-name').textContent = employeeName;
            loadAvailableAgentsForBinding();
            document.getElementById('bind-modal').classList.add('visible');
        }

        function closeBindModal() {
            document.getElementById('bind-modal').classList.remove('visible');
            currentBindEmployeeId = null;
            currentBindEmployeeName = null;
        }

        async function loadAvailableAgentsForBinding() {
            const select = document.getElementById('bind-agent-select');
            select.innerHTML = '<option value="">加载可用Agent...</option>';
            
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/agents/binding/available`);
                if (!response.ok) throw new Error('Failed to load available agents');
                
                const data = await response.json();
                if (data.available_agents.length === 0) {
                    select.innerHTML = '<option value="">暂无可用Agent</option>';
                    return;
                }
                
                select.innerHTML = data.available_agents.map(a => 
                    `<option value="${a.id}">${a.name} (${a.id})</option>`
                ).join('');
            } catch (error) {
                console.error('Error loading available agents:', error);
                select.innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function confirmBind() {
            const select = document.getElementById('bind-agent-select');
            const agentId = select.value;
            
            if (!agentId || !currentBindEmployeeId) {
                alert('请选择一个Agent');
                return;
            }
            
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/agents/binding/bind`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        employee_id: currentBindEmployeeId,
                        agent_id: agentId 
                    })
                });
                
                if (response.ok) {
                    closeBindModal();
                    loadData();
                    alert('绑定成功！');
                } else {
                    const error = await response.json();
                    alert('绑定失败: ' + (error.detail || '未知错误'));
                }
            } catch (error) {
                console.error('Error binding agent:', error);
                alert('绑定失败，请稍后重试');
            }
        }

        async function autoCreateAgent() {
            if (!currentBindEmployeeId) return;
            
            const confirm = window.confirm(
                `即将为 "${currentBindEmployeeName}" 自动创建 OpenClaw Agent。\n\n` +
                `这将：\n` +
                `1. 修改 openclaw.json 配置文件\n` +
                `2. 创建 Agent workspace\n` +
                `3. 生成基础 SOUL.md\n\n` +
                `注意：可能需要重启 OpenClaw Gateway 才能生效。\n\n` +
                `是否继续？`
            );
            
            if (!confirm) return;
            
            try {
                const response = await Auth.authFetch(`${API_BASE}/api/agents/auto-create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        employee_id: currentBindEmployeeId,
                        employee_name: currentBindEmployeeName
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    closeBindModal();
                    loadData();
                    alert(`创建成功！Agent ID: ${data.agent_id}\n\n记得重启 Gateway 以激活新 Agent。`);
                } else {
                    const error = await response.json();
                    alert('创建失败: ' + (error.detail || '未知错误'));
                }
            } catch (error) {
                console.error('Error auto-creating agent:', error);
                alert('创建失败，请稍后重试');
            }
        }
    </script>
</body>
</html>
