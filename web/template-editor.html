<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板编辑器 - OpenClaw OPC</title>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }
        
        .btn-success {
            background: #10b981;
            color: #fff;
        }
        
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #1a1a2e;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
        }
        
        .tab {
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
        }
        
        .tab:hover {
            background: #2a2a4a;
            color: #fff;
        }
        
        .tab.active {
            background: #667eea;
            color: #fff;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Template Grid */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .template-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .template-card:hover {
            transform: translateY(-4px);
            border-color: #667eea;
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.15);
        }
        
        .template-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .template-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .template-category {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            background: #667eea33;
            color: #667eea;
        }
        
        .template-desc {
            color: #888;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .template-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #666;
        }
        
        .template-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2a2a4a;
        }
        
        .template-action-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .template-action-btn:hover {
            background: #2a2a4a;
            color: #fff;
        }
        
        /* Editor Layout */
        .editor-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            height: calc(100vh - 200px);
        }
        
        /* Step List */
        .step-list-panel {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .step-list-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
            font-weight: 600;
        }
        
        .step-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .step-item:hover {
            border-color: #667eea;
        }
        
        .step-item.active {
            border-color: #667eea;
            background: #667eea11;
        }
        
        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        
        .step-item.active .step-number {
            background: #667eea;
        }
        
        .step-info {
            flex: 1;
        }
        
        .step-name {
            font-size: 13px;
            font-weight: 500;
        }
        
        .step-type {
            font-size: 11px;
            color: #666;
        }
        
        .step-actions {
            display: flex;
            gap: 4px;
        }
        
        .step-action {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .step-action:hover {
            background: #2a2a4a;
            color: #fff;
        }
        
        .add-step-btn {
            margin: 12px;
            padding: 12px;
            border: 2px dashed #2a2a4a;
            border-radius: 10px;
            background: transparent;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .add-step-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        /* Editor Panel */
        .editor-panel {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .editor-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .editor-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .editor-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        /* Type Selector */
        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .type-option {
            padding: 16px;
            background: #0f0f1a;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .type-option:hover {
            border-color: #3a3a5a;
        }
        
        .type-option.active {
            border-color: #667eea;
            background: #667eea11;
        }
        
        .type-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .type-name {
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Skills Selector */
        .skills-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .skill-option {
            padding: 8px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .skill-option:hover {
            border-color: #667eea;
        }
        
        .skill-option.selected {
            background: #667eea;
            border-color: #667eea;
        }
        
        /* Assignee Selector */
        .assignee-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .assignee-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #0f0f1a;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .assignee-option:hover {
            border-color: #3a3a5a;
        }
        
        .assignee-option.active {
            border-color: #667eea;
        }
        
        .assignee-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }
        
        .assignee-name {
            font-size: 13px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
            border: 1px solid #2a2a4a;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 24px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* Preview Panel */
        .preview-panel {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .preview-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
        }
        
        .preview-step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .preview-step-number {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }
        
        .preview-step-name {
            flex: 1;
            font-size: 13px;
        }
        
        .preview-step-type {
            padding: 4px 8px;
            background: #2a2a4a;
            border-radius: 4px;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <a href="/dashboard" class="back-btn">← 返回Dashboard</a>
                <div class="header-title">📐 模板编辑器</div>
            </div>
            
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='workflows.html'">
                    📚 模板市场
                </button>
                <button class="btn btn-primary" onclick="createNewTemplate()">
                    ➕ 新建模板
                </button>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="my-templates" onclick="switchTab('my-templates')">
                我的模板
            </button>
            <button class="tab" data-tab="editor" onclick="switchTab('editor')">
                编辑器
            </button>
        </div>
        
        <!-- My Templates Tab -->
        <div id="my-templates-tab" class="tab-content active">
            <div class="template-grid" id="my-templates-list">
                <!-- Dynamic content -->
            </div>
        </div>
        
        <!-- Editor Tab -->
        <div id="editor-tab" class="tab-content">
            <div class="editor-layout">
                <!-- Step List -->
                <div class="step-list-panel">
                    <div class="step-list-header">
                        步骤列表
                    </div>
                    
                    <div class="step-list" id="editor-step-list">
                        <!-- Dynamic steps -->
                    </div>
                    
                    <button class="add-step-btn" onclick="addNewStep()">
                        ➕ 添加步骤
                    </button>
                </div>
                
                <!-- Editor Panel -->
                <div class="editor-panel">
                    <div class="editor-header">
                        <div class="editor-title">步骤配置</div>
                        <button class="btn btn-success" onclick="saveTemplate()">
                            💾 保存模板
                        </button>
                    </div>
                    
                    <div class="editor-body" id="editor-body">
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <div>选择一个步骤进行编辑，或添加新步骤</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- New Template Modal -->
    <div class="modal-overlay" id="new-template-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">🆕 新建模板</div>
                <button class="modal-close" onclick="closeModal('new-template-modal')">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">模板名称</label>
                    <input type="text" class="form-input" id="new-template-name" placeholder="输入模板名称...">
                </div>
                
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" id="new-template-desc" placeholder="描述这个模板的用途..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="new-template-category">
                        <option value="development">开发</option>
                        <option value="design">设计</option>
                        <option value="research">研究</option>
                        <option value="documentation">文档</option>
                        <option value="marketing">市场</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('new-template-modal')">取消</button>
                <button class="btn btn-primary" onclick="confirmCreateTemplate()">创建并编辑</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentTemplate = null;
        let selectedStepIndex = -1;
        let allAgents = [];
        let allSkills = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMyTemplates();
            loadAgents();
            loadSkills();
        });
        
        // Load My Templates
        async function loadMyTemplates() {
            try {
                const response = await fetch('/api/workflow-templates/my');
                const templates = await response.json();
                renderMyTemplates(templates);
            } catch (error) {
                console.error('Failed to load templates:', error);
            }
        }
        
        // Render My Templates
        function renderMyTemplates(templates) {
            const container = document.getElementById('my-templates-list');
            
            if (templates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">📐</div>
                        <div class="empty-state-title">暂无模板</div>
                        <div>点击右上角按钮创建你的第一个模板</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = templates.map(t => `
                <div class="template-card">
                    <div class="template-header">
                        <div class="template-name">${t.name}</div>
                        <span class="template-category">${t.category}</span>
                    </div>
                    
                    <div class="template-desc">${t.description || '无描述'}</div>
                    
                    <div class="template-meta">
                        <span>📋 ${t.step_count || 0} 步骤</span>
                        <span>👁️ ${t.visibility}</span>
                        <span>🔖 v${t.version || 1}</span>
                    </div>
                    
                    <div class="template-actions">
                        <button class="template-action-btn" onclick="editTemplate('${t.id}')">编辑</button>
                        <button class="template-action-btn" onclick="useTemplate('${t.id}')">使用</button>
                        <button class="template-action-btn" onclick="deleteTemplate('${t.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Load Agents
        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                allAgents = await response.json();
            } catch (error) {
                console.error('Failed to load agents:', error);
            }
        }
        
        // Load Skills
        async function loadSkills() {
            try {
                const response = await fetch('/api/skills');
                allSkills = await response.json();
            } catch (error) {
                console.error('Failed to load skills:', error);
            }
        }
        
        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }
        
        // Create New Template
        function createNewTemplate() {
            document.getElementById('new-template-name').value = '';
            document.getElementById('new-template-desc').value = '';
            document.getElementById('new-template-category').value = 'development';
            openModal('new-template-modal');
        }
        
        function confirmCreateTemplate() {
            const name = document.getElementById('new-template-name').value;
            const desc = document.getElementById('new-template-desc').value;
            const category = document.getElementById('new-template-category').value;
            
            if (!name) {
                alert('请输入模板名称');
                return;
            }
            
            currentTemplate = {
                id: 'new_' + Date.now(),
                name,
                description: desc,
                category,
                visibility: 'private',
                steps: []
            };
            
            closeModal('new-template-modal');
            switchTab('editor');
            renderStepList();
            renderEditor();
        }
        
        // Edit Template
        async function editTemplate(templateId) {
            try {
                const response = await fetch(`/api/workflow-templates/${templateId}`);
                currentTemplate = await response.json();
                
                switchTab('editor');
                renderStepList();
                renderEditor();
            } catch (error) {
                console.error('Failed to load template:', error);
            }
        }
        
        // Render Step List
        function renderStepList() {
            const container = document.getElementById('editor-step-list');
            
            if (!currentTemplate || !currentTemplate.steps || currentTemplate.steps.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #666; text-align: center;">暂无步骤</div>';
                return;
            }
            
            container.innerHTML = currentTemplate.steps.map((step, index) => `
                <div class="step-item ${index === selectedStepIndex ? 'active' : ''}" onclick="selectStep(${index})">
                    <div class="step-number">${index + 1}</div>
                    
                    <div class="step-info">
                        <div class="step-name">${step.name || '未命名步骤'}</div>
                        <div class="step-type">${step.step_type || 'EXECUTE'}</div>
                    </div>
                    
                    <div class="step-actions">
                        <button class="step-action" onclick="event.stopPropagation(); moveStep(${index}, -1)" ${index === 0 ? 'disabled' : ''}>↑</button>
                        <button class="step-action" onclick="event.stopPropagation(); moveStep(${index}, 1)" ${index === currentTemplate.steps.length - 1 ? 'disabled' : ''}>↓</button>
                        <button class="step-action" onclick="event.stopPropagation(); deleteStep(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Select Step
        function selectStep(index) {
            selectedStepIndex = index;
            renderStepList();
            renderEditor();
        }
        
        // Add New Step
        function addNewStep() {
            if (!currentTemplate) {
                alert('请先创建模板');
                return;
            }
            
            currentTemplate.steps.push({
                name: '新步骤',
                step_type: 'EXECUTE',
                description: '',
                base_budget: 1000,
                rework_reserve: 500,
                estimated_hours: 4,
                required_skills: [],
                handbook: ''
            });
            
            selectedStepIndex = currentTemplate.steps.length - 1;
            renderStepList();
            renderEditor();
        }
        
        // Move Step
        function moveStep(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= currentTemplate.steps.length) return;
            
            const temp = currentTemplate.steps[index];
            currentTemplate.steps[index] = currentTemplate.steps[newIndex];
            currentTemplate.steps[newIndex] = temp;
            
            selectedStepIndex = newIndex;
            renderStepList();
        }
        
        // Delete Step
        function deleteStep(index) {
            if (!confirm('确定删除此步骤？')) return;
            
            currentTemplate.steps.splice(index, 1);
            
            if (selectedStepIndex >= currentTemplate.steps.length) {
                selectedStepIndex = currentTemplate.steps.length - 1;
            }
            
            renderStepList();
            renderEditor();
        }
        
        // Render Editor
        function renderEditor() {
            const container = document.getElementById('editor-body');
            
            if (!currentTemplate) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📐</div>
                        <div>请先创建或选择一个模板</div>
                    </div>
                `;
                return;
            }
            
            if (selectedStepIndex === -1 || !currentTemplate.steps[selectedStepIndex]) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div>选择一个步骤进行编辑，或添加新步骤</div>
                    </div>
                `;
                return;
            }
            
            const step = currentTemplate.steps[selectedStepIndex];
            
            container.innerHTML = `
                <div class="form-group">
                    <label class="form-label">步骤名称</label>
                    <input type="text" class="form-input" id="step-name" value="${step.name || ''}" 
                           onchange="updateStep('name', this.value)">
                </div>
                
                <div class="form-group">
                    <label class="form-label">步骤类型</label>
                    <div class="type-selector">
                        ${['PLAN', 'EXECUTE', 'REVIEW', 'TEST', 'APPROVE', 'DOCUMENT'].map(type => {
                            const icons = { PLAN: '📋', EXECUTE: '⚙️', REVIEW: '🔍', TEST: '🧪', APPROVE: '✅', DOCUMENT: '📄' };
                            const names = { PLAN: '规划', EXECUTE: '执行', REVIEW: '评审', TEST: '测试', APPROVE: '审批', DOCUMENT: '文档' };
                            return `
                                <div class="type-option ${step.step_type === type ? 'active' : ''}" onclick="updateStep('step_type', '${type}')">
                                    <div class="type-icon">${icons[type]}</div>
                                    <div class="type-name">${names[type]}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" id="step-desc" placeholder="描述此步骤的目标..."
                              onchange="updateStep('description', this.value)">${step.description || ''}</textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">基础预算 (OP)</label>
                        <input type="number" class="form-input" value="${step.base_budget || 1000}" min="0"
                               onchange="updateStep('base_budget', parseInt(this.value))">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">返工预算 (OP)</label>
                        <input type="number" class="form-input" value="${step.rework_reserve || 500}" min="0"
                               onchange="updateStep('rework_reserve', parseInt(this.value))">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">预计耗时（小时）</label>
                    <input type="number" class="form-input" value="${step.estimated_hours || 4}" min="0.5" step="0.5"
                           onchange="updateStep('estimated_hours', parseFloat(this.value))">
                </div>
                
                <div class="form-group">
                    <label class="form-label">所需技能</label>
                    <div class="skills-selector" id="skills-selector">
                        <!-- Dynamic skills -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">执行手册</label>
                    <textarea class="form-textarea" placeholder="输入执行手册内容..."
                              onchange="updateStep('handbook', this.value)">${step.handbook || ''}</textarea>
                </div>
            `;
            
            renderSkillsSelector(step.required_skills || []);
        }
        
        // Render Skills Selector
        function renderSkillsSelector(selectedSkills) {
            const container = document.getElementById('skills-selector');
            if (!container) return;
            
            container.innerHTML = allSkills.map(skill => `
                <span class="skill-option ${selectedSkills.includes(skill.id) ? 'selected' : ''}" 
                      onclick="toggleSkill('${skill.id}')">
                    ${skill.name}
                </span>
            `).join('');
        }
        
        // Update Step
        function updateStep(field, value) {
            if (selectedStepIndex === -1 || !currentTemplate.steps[selectedStepIndex]) return;
            
            currentTemplate.steps[selectedStepIndex][field] = value;
            
            if (field === 'name' || field === 'step_type') {
                renderStepList();
            }
        }
        
        // Toggle Skill
        function toggleSkill(skillId) {
            if (selectedStepIndex === -1) return;
            
            const step = currentTemplate.steps[selectedStepIndex];
            const skills = step.required_skills || [];
            
            if (skills.includes(skillId)) {
                step.required_skills = skills.filter(id => id !== skillId);
            } else {
                step.required_skills = [...skills, skillId];
            }
            
            renderSkillsSelector(step.required_skills);
        }
        
        // Save Template
        async function saveTemplate() {
            if (!currentTemplate) {
                alert('没有可保存的模板');
                return;
            }
            
            if (currentTemplate.steps.length === 0) {
                alert('请至少添加一个步骤');
                return;
            }
            
            try {
                const isNew = currentTemplate.id.startsWith('new_');
                const url = isNew ? '/api/workflow-templates' : `/api/workflow-templates/${currentTemplate.id}`;
                const method = isNew ? 'POST' : 'PUT';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: currentTemplate.name,
                        description: currentTemplate.description,
                        category: currentTemplate.category,
                        visibility: currentTemplate.visibility,
                        steps: currentTemplate.steps
                    })
                });
                
                if (response.ok) {
                    alert('保存成功！');
                    if (isNew) {
                        loadMyTemplates();
                        switchTab('my-templates');
                    }
                } else {
                    const error = await response.json();
                    alert(error.detail || '保存失败');
                }
            } catch (error) {
                console.error('Failed to save template:', error);
                alert('保存失败');
            }
        }
        
        // Use Template
        function useTemplate(templateId) {
            window.location.href = `/dashboard/workflow-detail.html?template_id=${templateId}`;
        }
        
        // Delete Template
        async function deleteTemplate(templateId) {
            if (!confirm('确定删除此模板？')) return;
            
            try {
                const response = await fetch(`/api/workflow-templates/${templateId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadMyTemplates();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('Failed to delete template:', error);
            }
        }
        
        // Modal Functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
