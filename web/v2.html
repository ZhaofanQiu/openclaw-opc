<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | OpenClaw OPC v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #334155;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        .stat-meta {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }

        /* Section */
        .section {
            margin-bottom: 32px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        /* Tables */
        .table-container {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #334155;
            background: #0f172a;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #334155;
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #252f47;
        }

        /* Status badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-idle {
            background: #22c55e20;
            color: #22c55e;
        }

        .badge-working {
            background: #f59e0b20;
            color: #f59e0b;
        }

        .badge-pending {
            background: #64748b20;
            color: #64748b;
        }

        .badge-assigned {
            background: #3b82f620;
            color: #3b82f6;
        }

        .badge-completed {
            background: #22c55e20;
            color: #22c55e;
        }

        /* Employee card */
        .employee-name {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .employee-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .employee-info {
            display: flex;
            flex-direction: column;
        }

        .employee-name-text {
            font-weight: 500;
            color: #e2e8f0;
        }

        .employee-agent {
            font-size: 12px;
            color: #64748b;
        }

        /* Empty state */
        .empty-state {
            padding: 48px;
            text-align: center;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Budget bar */
        .budget-bar {
            width: 120px;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }

        .budget-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #f59e0b);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .budget-fill.high {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
        }

        /* Link */
        .link {
            color: #667eea;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        /* Loading */
        .loading {
            padding: 48px;
            text-align: center;
            color: #64748b;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            border: 1px solid #334155;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        .toast.success {
            background: #22c55e;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 OpenClaw OPC v2.0</h1>
            <div class="header-actions">
                <a href="/dashboard/agent-logs.html" class="btn btn-secondary">📋 交互日志</a>
                <a href="/dashboard/employees.html" class="btn btn-secondary">👥 员工管理</a>
                <a href="/dashboard/tasks.html" class="btn btn-secondary">📋 任务管理</a>
                <button class="btn btn-primary" onclick="openCreateEmployeeModal()">+ 创建员工</button>
                <button class="btn btn-primary" onclick="openCreateTaskModal()">+ 创建任务</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">员工总数</div>
                <div class="stat-value" id="stat-employees">-</div>
                <div class="stat-meta">活跃员工</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">待办任务</div>
                <div class="stat-value" id="stat-pending">-</div>
                <div class="stat-meta">等待分配</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">进行中</div>
                <div class="stat-value" id="stat-working">-</div>
                <div class="stat-meta">正在执行</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总预算</div>
                <div class="stat-value" id="stat-budget">-</div>
                <div class="stat-meta">OC币</div>
            </div>
        </div>

        <!-- Employees Section -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">👥 员工列表</h2>
                <a href="/employees.html" class="link">查看全部 →</a>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>员工</th>
                            <th>Agent ID</th>
                            <th>状态</th>
                            <th>预算使用情况</th>
                            <th>当前任务</th>
                        </tr>
                    </thead>
                    <tbody id="employees-table">
                        <tr><td colspan="5" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tasks Section -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">📋 任务列表</h2>
                <a href="/tasks.html" class="link">查看全部 →</a>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>任务</th>
                            <th>优先级</th>
                            <th>状态</th>
                            <th>分配给</th>
                            <th>预估成本</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-table">
                        <tr><td colspan="6" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create Employee Modal -->
    <div class="modal-overlay" id="create-employee-modal">
        <div class="modal">
            <div class="modal-header">创建新员工</div>
            <form id="create-employee-form">
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" name="name" required placeholder="输入员工姓名">
                </div>
                <div class="form-group">
                    <label class="form-label">Emoji</label>
                    <input type="text" class="form-input" name="emoji" value="🤖" maxlength="2">
                </div>
                <div class="form-group">
                    <label class="form-label">职位级别</label>
                    <select class="form-select" name="position_level">
                        <option value="1">初级 (Level 1)</option>
                        <option value="2" selected>中级 (Level 2)</option>
                        <option value="3">高级 (Level 3)</option>
                        <option value="4">专家 (Level 4)</option>
                        <option value="5">Partner (Level 5)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">月度预算 (OC币)</label>
                    <input type="number" class="form-input" name="monthly_budget" value="5000" min="100">
                </div>
                <div class="form-group">
                    <label class="form-label">OpenClaw Agent ID</label>
                    <input type="text" class="form-input" name="openclaw_agent_id" placeholder="如: opc_partner">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('create-employee-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal-overlay" id="create-task-modal">
        <div class="modal">
            <div class="modal-header">创建新任务</div>
            <form id="create-task-form">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" name="title" required placeholder="输入任务标题">
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" name="description" placeholder="输入任务描述"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">优先级</label>
                    <select class="form-select" name="priority">
                        <option value="low">低</option>
                        <option value="medium" selected>中</option>
                        <option value="high">高</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">预估成本 (tokens)</label>
                    <input type="number" class="form-input" name="estimated_cost" value="1000" min="0">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('create-task-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assign Task Modal -->
    <div class="modal-overlay" id="assign-task-modal">
        <div class="modal">
            <div class="modal-header">分配任务</div>
            <form id="assign-task-form">
                <input type="hidden" name="task_id">
                <div class="form-group">
                    <label class="form-label">选择员工</label>
                    <select class="form-select" name="agent_id" id="assign-agent-select" required>
                        <option value="">选择员工...</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('assign-task-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">分配</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // API Configuration
        const API_BASE = '/api';

        // Utility functions
        function formatCurrency(value) {
            return value.toLocaleString('zh-CN', { maximumFractionDigits: 2 });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        function getStatusBadge(status) {
            const badges = {
                'idle': '<span class="badge badge-idle">空闲</span>',
                'working': '<span class="badge badge-working">工作中</span>',
                'pending': '<span class="badge badge-pending">待处理</span>',
                'assigned': '<span class="badge badge-assigned">已分配</span>',
                'completed': '<span class="badge badge-completed">已完成</span>'
            };
            return badges[status] || `<span class="badge">${status}</span>`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Modal functions
        function openCreateEmployeeModal() {
            document.getElementById('create-employee-form').reset();
            openModal('create-employee-modal');
        }

        function openCreateTaskModal() {
            document.getElementById('create-task-form').reset();
            openModal('create-task-modal');
        }

        function openAssignTaskModal(taskId) {
            document.getElementById('assign-task-form').reset();
            document.querySelector('#assign-task-form [name="task_id"]').value = taskId;
            loadEmployeesForSelect();
            openModal('assign-task-modal');
        }

        // API functions
        async function fetchEmployees() {
            try {
                const response = await fetch(`${API_BASE}/agents`);
                const data = await response.json();
                return data.agents || [];
            } catch (error) {
                console.error('Failed to fetch employees:', error);
                return [];
            }
        }

        async function fetchTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                const data = await response.json();
                return data.tasks || [];
            } catch (error) {
                console.error('Failed to fetch tasks:', error);
                return [];
            }
        }

        // Render functions
        function renderEmployees(employees) {
            const tbody = document.getElementById('employees-table');
            
            if (employees.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <div class="empty-state-icon">👥</div>
                            <div>暂无员工</div>
                            <button class="btn btn-primary" style="margin-top: 16px;" onclick="openCreateEmployeeModal()">创建第一个员工</button>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = employees.slice(0, 5).map(emp => {
                const budgetPercent = (emp.used_budget / emp.monthly_budget * 100).toFixed(1);
                const isHigh = budgetPercent > 80;
                
                return `
                    <tr>
                        <td>
                            <div class="employee-name">
                                <div class="employee-avatar">${emp.emoji}</div>
                                <div class="employee-info">
                                    <div class="employee-name-text">${emp.name}</div>
                                    <div class="employee-agent">Level ${emp.position_level}</div>
                                </div>
                            </div>
                        </td>
                        <td>${emp.openclaw_agent_id || '-'}</td>
                        <td>${getStatusBadge(emp.status)}</td>
                        <td>
                            <div>${formatCurrency(emp.used_budget)} / ${formatCurrency(emp.monthly_budget)} OC币</div>
                            <div class="budget-bar">
                                <div class="budget-fill ${isHigh ? 'high' : ''}" style="width: ${Math.min(budgetPercent, 100)}%"></div>
                            </div>
                        </td>
                        <td>${emp.current_task_id ? `<a href="/dashboard/task-detail.html?task=${emp.current_task_id}" class="link">查看</a>` : '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderTasks(tasks) {
            const tbody = document.getElementById('tasks-table');
            
            if (tasks.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <div>暂无任务</div>
                            <button class="btn btn-primary" style="margin-top: 16px;" onclick="openCreateTaskModal()">创建第一个任务</button>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = tasks.slice(0, 5).map(task => {
                const priorityLabels = { 'low': '低', 'medium': '中', 'high': '高' };
                
                return `
                    <tr>
                        <td>
                            <div class="employee-info">
                                <div class="employee-name-text">${task.title}</div>
                                <div class="employee-agent">${task.description ? task.description.substring(0, 30) + '...' : '-'}</div>
                            </div>
                        </td>
                        <td>${priorityLabels[task.priority] || task.priority}</td>
                        <td>${getStatusBadge(task.status)}</td>
                        <td>${task.assigned_to || '-'}</td>
                        <td>${task.estimated_cost || 0} tokens</td>
                        <td>
                            ${task.status === 'pending' 
                                ? `<button class="btn btn-primary" onclick="openAssignTaskModal('${task.id}')">分配</button>` 
                                : task.status === 'completed'
                                    ? `<a href="/dashboard/task-detail.html?task=${task.id}" class="link">查看结果</a>`
                                    : `<a href="/dashboard/task-detail.html?task=${task.id}" class="link">查看详情</a>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats(employees, tasks) {
            document.getElementById('stat-employees').textContent = employees.length;
            document.getElementById('stat-pending').textContent = tasks.filter(t => t.status === 'pending').length;
            document.getElementById('stat-working').textContent = tasks.filter(t => t.status === 'assigned' || t.status === 'in_progress').length;
            
            const totalBudget = employees.reduce((sum, e) => sum + e.monthly_budget, 0);
            document.getElementById('stat-budget').textContent = formatCurrency(totalBudget);
        }

        async function loadEmployeesForSelect() {
            const employees = await fetchEmployees();
            const select = document.getElementById('assign-agent-select');
            select.innerHTML = '<option value="">选择员工...</option>' + 
                employees.map(e => `<option value="${e.id}">${e.emoji} ${e.name} (剩余: ${formatCurrency(e.remaining_budget)} OC币)</option>`).join('');
        }

        // Form handlers
        document.getElementById('create-employee-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch(`${API_BASE}/agents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    showToast('员工创建成功！');
                    closeModal('create-employee-modal');
                    
                    // If agent_id provided, bind it
                    if (data.openclaw_agent_id) {
                        await fetch(`${API_BASE}/agents/${result.id}/bind`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ openclaw_agent_id: data.openclaw_agent_id })
                        });
                    }
                    
                    await loadData();
                } else {
                    const error = await response.json();
                    showToast(error.detail || '创建失败', 'error');
                }
            } catch (error) {
                showToast('创建失败: ' + error.message, 'error');
            }
        });

        document.getElementById('create-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.estimated_cost = parseFloat(data.estimated_cost);
            
            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showToast('任务创建成功！');
                    closeModal('create-task-modal');
                    await loadData();
                } else {
                    const error = await response.json();
                    showToast(error.detail || '创建失败', 'error');
                }
            } catch (error) {
                showToast('创建失败: ' + error.message, 'error');
            }
        });

        document.getElementById('assign-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch(`${API_BASE}/tasks/${data.task_id}/assign`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: data.agent_id })
                });
                
                if (response.ok) {
                    showToast('任务分配成功！');
                    closeModal('assign-task-modal');
                    await loadData();
                } else {
                    const error = await response.json();
                    showToast(error.detail || '分配失败', 'error');
                }
            } catch (error) {
                showToast('分配失败: ' + error.message, 'error');
            }
        });

        // Main load function
        async function loadData() {
            const [employees, tasks] = await Promise.all([fetchEmployees(), fetchTasks()]);
            renderEmployees(employees);
            renderTasks(tasks);
            updateStats(employees, tasks);
        }

        // Initialize
        loadData();

        // Auto-refresh every 10 seconds as fallback
        setInterval(loadData, 10000);

        // ============ WebSocket Real-time Updates ============
        let ws = null;
        let wsReconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                wsReconnectAttempts = 0;
                showToast('🟢 实时连接已建立', 'success');
            };
            
            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    handleWebSocketMessage(message);
                } catch (error) {
                    console.error('WebSocket message error:', error);
                }
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                if (wsReconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    wsReconnectAttempts++;
                    setTimeout(connectWebSocket, 3000 * wsReconnectAttempts);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function handleWebSocketMessage(message) {
            const { type } = message;
            
            switch (type) {
                case 'task_assigned':
                    showToast(`📋 任务 "${message.task_title}" 已分配给 ${message.agent_name}`);
                    loadData();
                    break;
                    
                case 'task_started':
                    showToast('▶️ 任务开始执行');
                    loadData();
                    break;
                    
                case 'task_completed':
                    showToast(message.success ? '✅ 任务已完成' : '❌ 任务失败');
                    loadData();
                    break;
                    
                case 'agent_status_change':
                    loadData();
                    break;
                    
                case 'budget_update':
                    loadData();
                    break;
                    
                case 'log_created':
                    // 如果当前在日志页面，可能需要刷新
                    break;
                    
                case 'connected':
                    console.log('WebSocket:', message.message);
                    break;
                    
                default:
                    console.log('WebSocket message:', message);
            }
        }

        // 启动 WebSocket 连接
        connectWebSocket();
    </script>
</body>
</html>
