<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作流编辑器 - OpenClaw OPC</title>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #1a1a2e;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
        }
        
        .tab {
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
        }
        
        .tab:hover {
            background: #2a2a4a;
            color: #fff;
        }
        
        .tab.active {
            background: #667eea;
            color: #fff;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Workflow Cards */
        .workflow-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .workflow-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .workflow-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        
        .workflow-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .workflow-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        .workflow-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-pending { background: #f59e0b33; color: #f59e0b; }
        .status-progress { background: #3b82f633; color: #3b82f6; }
        .status-completed { background: #10b98133; color: #10b981; }
        .status-fused { background: #ef444433; color: #ef4444; }
        
        .workflow-desc {
            color: #888;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .workflow-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #666;
        }
        
        .workflow-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .workflow-progress {
            margin-top: 16px;
        }
        
        .progress-bar {
            height: 6px;
            background: #2a2a4a;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
            text-align: right;
        }
        
        /* Template Cards */
        .template-card {
            position: relative;
            overflow: hidden;
        }
        
        .template-category {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            background: #667eea33;
            color: #667eea;
        }
        
        .template-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2a2a4a;
        }
        
        .template-stat {
            text-align: center;
        }
        
        .template-stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .template-stat-label {
            font-size: 11px;
            color: #666;
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #3a3a5a;
        }
        
        .btn-success {
            background: #10b981;
            color: #fff;
        }
        
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
            border: 1px solid #2a2a4a;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        /* Step Editor */
        .step-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .step-item {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .step-content {
            flex: 1;
        }
        
        .step-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .step-type-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .type-plan { background: #8b5cf633; color: #8b5cf6; }
        .type-execute { background: #3b82f633; color: #3b82f6; }
        .type-review { background: #f59e0b33; color: #f59e0b; }
        .type-test { background: #10b98133; color: #10b981; }
        .type-approve { background: #ef444433; color: #ef4444; }
        
        .step-actions {
            display: flex;
            gap: 8px;
        }
        
        .step-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .step-action-btn:hover {
            background: #2a2a4a;
            color: #fff;
        }
        
        /* Notification Center */
        .notification-center {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 380px;
            max-height: 500px;
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            overflow: hidden;
            display: none;
        }
        
        .notification-center.active {
            display: block;
        }
        
        .notification-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .notification-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .notification-item {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .notification-item:hover {
            background: #2a2a4a;
        }
        
        .notification-item.unread {
            border-left: 3px solid #667eea;
        }
        
        .notification-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .notification-message {
            font-size: 13px;
            color: #888;
            line-height: 1.4;
        }
        
        .notification-time {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state-title {
            font-size: 18px;
            color: #888;
            margin-bottom: 8px;
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-chip:hover, .filter-chip.active {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        
        /* Notification Bell */
        .notification-bell {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a2a4a;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ef4444;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* WebSocket Status */
        .ws-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }
        
        .ws-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }
        
        .ws-status.connected .ws-status-dot {
            background: #10b981;
        }
        
        .ws-status.connected {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div>
                <h1>🔄 工作流管理</h1>
                <div style="color: #888; font-size: 14px; margin-top: 4px;">Workflow Management System</div>
            </div>
            <div class="header-actions">
                <div class="ws-status" id="ws-status">
                    <div class="ws-status-dot"></div>
                    <span>离线</span>
                </div>
                <button class="notification-bell" onclick="toggleNotificationCenter()">
                    🔔
                    <div class="notification-badge" id="notification-badge" style="display: none;">0</div>
                </button>
                <button class="btn btn-primary" onclick="openCreateWorkflowModal()">
                    ➕ 新建工作流
                </button>
            </div>
        </header>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="workflows" onclick="switchTab('workflows')">
                📋 我的工作流
            </button>
            <button class="tab" data-tab="templates" onclick="switchTab('templates')">
                📚 模板市场
            </button>
            <button class="tab" data-tab="analytics" onclick="switchTab('analytics')">
                📊 统计分析
            </button>
        </div>
        
        <!-- Workflows Tab -->
        <div id="workflows-tab" class="tab-content active">
            <div class="filter-bar">
                <div class="filter-chip active" data-filter="all" onclick="filterWorkflows('all')">全部</div>
                <div class="filter-chip" data-filter="pending" onclick="filterWorkflows('pending')">待启动</div>
                <div class="filter-chip" data-filter="progress" onclick="filterWorkflows('progress')">进行中</div>
                <div class="filter-chip" data-filter="completed" onclick="filterWorkflows('completed')">已完成</div>
                <div class="filter-chip" data-filter="fused" onclick="filterWorkflows('fused')">已熔断</div>
            </div>
            <div class="workflow-grid" id="workflows-list">
                <!-- Dynamic content -->
            </div>
        </div>
        
        <!-- Templates Tab -->
        <div id="templates-tab" class="tab-content">
            <div class="filter-bar">
                <div class="filter-chip active" data-filter="all" onclick="filterTemplates('all')">全部</div>
                <div class="filter-chip" data-filter="development" onclick="filterTemplates('development')">开发</div>
                <div class="filter-chip" data-filter="research" onclick="filterTemplates('research')">研究</div>
                <div class="filter-chip" data-filter="documentation" onclick="filterTemplates('documentation')">文档</div>
                <div class="filter-chip" data-filter="my" onclick="filterTemplates('my')">我的模板</div>
            </div>
            <div class="workflow-grid" id="templates-list">
                <!-- Dynamic content -->
            </div>
        </div>
        
        <!-- Analytics Tab -->
        <div id="analytics-tab" class="tab-content">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
                <div style="background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a;">
                    <h3 style="margin-bottom: 16px;">工作流完成趋势</h3>
                    <canvas id="completionTrendChart"></canvas>
                </div>
                <div style="background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a;">
                    <h3 style="margin-bottom: 16px;">返工率分析</h3>
                    <canvas id="reworkRateChart"></canvas>
                </div>
                <div style="background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a;">
                    <h3 style="margin-bottom: 16px;">预算使用分布</h3>
                    <canvas id="budgetChart"></canvas>
                </div>
                <div style="background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a;">
                    <h3 style="margin-bottom: 16px;">员工效率排行</h3>
                    <div id="agentEfficiencyList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Notification Center -->
    <div class="notification-center" id="notification-center">
        <div class="notification-header">
            <h3 style="font-size: 16px;">通知中心</h3>
            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="markAllRead()">
                全部已读
            </button>
        </div>
        <div class="notification-list" id="notification-list">
            <!-- Dynamic content -->
        </div>
    </div>
    
    <!-- Create Workflow Modal -->
    <div class="modal-overlay" id="create-workflow-modal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <div class="modal-title">🆕 新建工作流</div>
                <button class="modal-close" onclick="closeModal('create-workflow-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">工作流标题</label>
                    <input type="text" class="form-input" id="workflow-title" placeholder="输入工作流标题...">
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" id="workflow-desc" placeholder="描述这个工作流的目标..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">从模板创建（可选）</label>
                    <select class="form-select" id="workflow-template">
                        <option value="">不使用模板</option>
                        <!-- Dynamic options -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('create-workflow-modal')">取消</button>
                <button class="btn btn-primary" onclick="createWorkflow()">创建</button>
            </div>
        </div>
    </div>
    
    <!-- Workflow Detail Modal -->
    <div class="modal-overlay" id="workflow-detail-modal">
        <div class="modal" style="max-width: 900px;">
            <div class="modal-header">
                <div class="modal-title" id="detail-title">工作流详情</div>
                <button class="modal-close" onclick="closeModal('workflow-detail-modal')">&times;</button>
            </div>
            <div class="modal-body" id="detail-content">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer" id="detail-footer">
                <!-- Dynamic buttons -->
            </div>
        </div>
    </div>

    <script>
        // State
        let currentTab = 'workflows';
        let workflows = [];
        let templates = [];
        let notifications = [];
        let ws = null;
        let charts = {};
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadWorkflows();
            loadTemplates();
            loadNotifications();
            initWebSocket();
            initCharts();
        });
        
        // Tab Switching
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
            
            if (tab === 'analytics') {
                loadAnalytics();
            }
        }
        
        // Load Workflows
        async function loadWorkflows() {
            try {
                const response = await fetch('/api/workflows');
                workflows = await response.json();
                renderWorkflows();
            } catch (error) {
                console.error('Failed to load workflows:', error);
            }
        }
        
        // Render Workflows
        function renderWorkflows(filter = 'all') {
            const container = document.getElementById('workflows-list');
            let filtered = workflows;
            
            if (filter !== 'all') {
                const statusMap = {
                    'pending': 'pending',
                    'progress': 'in_progress',
                    'completed': 'completed',
                    'fused': ['budget_fused', 'rework_fused']
                };
                const targetStatus = statusMap[filter];
                if (Array.isArray(targetStatus)) {
                    filtered = workflows.filter(w => targetStatus.includes(w.status));
                } else {
                    filtered = workflows.filter(w => w.status === targetStatus);
                }
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-title">暂无工作流</div>
                        <div>点击右上角按钮创建第一个工作流</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(w => {
                const statusConfig = {
                    'pending': { class: 'status-pending', text: '待启动' },
                    'in_progress': { class: 'status-progress', text: '进行中' },
                    'completed': { class: 'status-completed', text: '已完成' },
                    'budget_fused': { class: 'status-fused', text: '预算熔断' },
                    'rework_fused': { class: 'status-fused', text: '返工熔断' },
                };
                const status = statusConfig[w.status] || { class: '', text: w.status };
                
                const totalSteps = w.steps?.length || 0;
                const completedSteps = w.steps?.filter(s => s.status === 'completed').length || 0;
                const progress = totalSteps > 0 ? (completedSteps / totalSteps * 100).toFixed(0) : 0;
                
                return `
                    <div class="workflow-card" onclick="openWorkflowDetail('${w.id}')">
                        <div class="workflow-header">
                            <div class="workflow-title">${w.title}</div>
                            <span class="workflow-status ${status.class}">${status.text}</span>
                        </div>
                        <div class="workflow-desc">${w.description || '无描述'}</div>
                        <div class="workflow-meta">
                            <span>👤 ${w.owner_name || '未知'}</span>
                            <span>📅 ${new Date(w.created_at).toLocaleDateString()}</span>
                            <span>💰 ${w.total_budget} OP</span>
                        </div>
                        <div class="workflow-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <div class="progress-text">${completedSteps}/${totalSteps} 步骤 (${progress}%)</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Filter Workflows
        function filterWorkflows(filter) {
            document.querySelectorAll('#workflows-tab .filter-chip').forEach(c => c.classList.remove('active'));
            document.querySelector(`#workflows-tab .filter-chip[data-filter="${filter}"]`).classList.add('active');
            renderWorkflows(filter);
        }
        
        // Load Templates
        async function loadTemplates() {
            try {
                const response = await fetch('/api/workflow-templates/public');
                templates = await response.json();
                renderTemplates();
            } catch (error) {
                console.error('Failed to load templates:', error);
            }
        }
        
        // Render Templates
        function renderTemplates(filter = 'all') {
            const container = document.getElementById('templates-list');
            let filtered = templates;
            
            if (filter !== 'all' && filter !== 'my') {
                filtered = templates.filter(t => t.category === filter);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">📚</div>
                        <div class="empty-state-title">暂无模板</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(t => `
                <div class="workflow-card template-card" onclick="useTemplate('${t.id}')">
                    <span class="template-category">${t.category}</span>
                    <div class="workflow-title">${t.name}</div>
                    <div class="workflow-desc">${t.description || '无描述'}</div>
                    <div class="template-stats">
                        <div class="template-stat">
                            <div class="template-stat-value">${t.usage_count || 0}</div>
                            <div class="template-stat-label">使用次数</div>
                        </div>
                        <div class="template-stat">
                            <div class="template-stat-value">${t.avg_rating?.toFixed(1) || '-'}</div>
                            <div class="template-stat-label">评分</div>
                        </div>
                        <div class="template-stat">
                            <div class="template-stat-value">${t.fork_count || 0}</div>
                            <div class="template-stat-label">Fork</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Filter Templates
        function filterTemplates(filter) {
            document.querySelectorAll('#templates-tab .filter-chip').forEach(c => c.classList.remove('active'));
            document.querySelector(`#templates-tab .filter-chip[data-filter="${filter}"]`).classList.add('active');
            renderTemplates(filter);
        }
        
        // Modal Functions
        function openCreateWorkflowModal() {
            document.getElementById('create-workflow-modal').classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // Create Workflow
        async function createWorkflow() {
            const title = document.getElementById('workflow-title').value;
            const description = document.getElementById('workflow-desc').value;
            const templateId = document.getElementById('workflow-template').value;
            
            if (!title) {
                alert('请输入工作流标题');
                return;
            }
            
            try {
                const response = await fetch('/api/workflows', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        description,
                        template_id: templateId || undefined
                    })
                });
                
                if (response.ok) {
                    closeModal('create-workflow-modal');
                    loadWorkflows();
                    document.getElementById('workflow-title').value = '';
                    document.getElementById('workflow-desc').value = '';
                } else {
                    alert('创建工作流失败');
                }
            } catch (error) {
                console.error('Failed to create workflow:', error);
            }
        }
        
        // WebSocket
        function initWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws/notifications?user_id=${getCurrentUserId()}&token=${getAuthToken()}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                updateWsStatus(true);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                updateWsStatus(false);
                setTimeout(initWebSocket, 5000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        function updateWsStatus(connected) {
            const statusEl = document.getElementById('ws-status');
            if (connected) {
                statusEl.classList.add('connected');
                statusEl.querySelector('span').textContent = '在线';
            } else {
                statusEl.classList.remove('connected');
                statusEl.querySelector('span').textContent = '离线';
            }
        }
        
        function handleWebSocketMessage(data) {
            if (data.type === 'notification') {
                addNotification(data.data);
            } else if (data.type === 'workflow_update') {
                loadWorkflows();
            }
        }
        
        // Notifications
        function addNotification(notification) {
            notifications.unshift(notification);
            updateNotificationBadge();
            renderNotifications();
            
            // Browser notification
            if (Notification.permission === 'granted') {
                new Notification(notification.title, {
                    body: notification.message,
                    icon: '/favicon.ico'
                });
            }
        }
        
        async function loadNotifications() {
            try {
                const response = await fetch('/ws/notifications/unread?agent_id=' + getCurrentUserId());
                const data = await response.json();
                notifications = data.notifications || [];
                updateNotificationBadge();
                renderNotifications();
            } catch (error) {
                console.error('Failed to load notifications:', error);
            }
        }
        
        function renderNotifications() {
            const container = document.getElementById('notification-list');
            
            if (notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 40px 20px;">
                        <div class="empty-state-icon">🔔</div>
                        <div class="empty-state-title">暂无通知</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notifications.map(n => `
                <div class="notification-item ${n.is_read === 'false' ? 'unread' : ''}" onclick="markNotificationRead(${n.id})">
                    <div class="notification-title">${n.title}</div>
                    <div class="notification-message">${n.message}</div>
                    <div class="notification-time">${new Date(n.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }
        
        function updateNotificationBadge() {
            const unreadCount = notifications.filter(n => n.is_read === 'false').length;
            const badge = document.getElementById('notification-badge');
            badge.textContent = unreadCount;
            badge.style.display = unreadCount > 0 ? 'flex' : 'none';
        }
        
        function toggleNotificationCenter() {
            document.getElementById('notification-center').classList.toggle('active');
        }
        
        async function markNotificationRead(id) {
            try {
                await fetch(`/ws/notifications/${id}/read?agent_id=${getCurrentUserId()}`, {
                    method: 'POST'
                });
                const notification = notifications.find(n => n.id === id);
                if (notification) {
                    notification.is_read = 'true';
                }
                updateNotificationBadge();
                renderNotifications();
            } catch (error) {
                console.error('Failed to mark notification as read:', error);
            }
        }
        
        async function markAllRead() {
            try {
                await fetch(`/ws/notifications/read-all?agent_id=${getCurrentUserId()}`, {
                    method: 'POST'
                });
                notifications.forEach(n => n.is_read = 'true');
                updateNotificationBadge();
                renderNotifications();
            } catch (error) {
                console.error('Failed to mark all as read:', error);
            }
        }
        
        // Analytics
        function initCharts() {
            // Will be initialized when analytics tab is shown
        }
        
        async function loadAnalytics() {
            try {
                const response = await fetch('/api/workflow-extensions/analytics');
                const data = await response.json();
                renderAnalytics(data);
            } catch (error) {
                console.error('Failed to load analytics:', error);
            }
        }
        
        function renderAnalytics(data) {
            // Completion Trend Chart
            const ctx1 = document.getElementById('completionTrendChart').getContext('2d');
            if (charts.completion) charts.completion.destroy();
            charts.completion = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: data.completion_trend?.map(d => d.date) || [],
                    datasets: [{
                        label: '完成数',
                        data: data.completion_trend?.map(d => d.count) || [],
                        borderColor: '#10b981',
                        backgroundColor: '#10b98133',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#2a2a4a' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888' } }
                    }
                }
            });
            
            // Rework Rate Chart
            const ctx2 = document.getElementById('reworkRateChart').getContext('2d');
            if (charts.rework) charts.rework.destroy();
            charts.rework = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: data.rework_analysis?.map(d => d.agent_name) || [],
                    datasets: [{
                        label: '返工率 (%)',
                        data: data.rework_analysis?.map(d => d.rework_rate) || [],
                        backgroundColor: '#f59e0b'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#2a2a4a' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888' } }
                    }
                }
            });
            
            // Budget Chart
            const ctx3 = document.getElementById('budgetChart').getContext('2d');
            if (charts.budget) charts.budget.destroy();
            charts.budget = new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: ['基础预算', '返工预算', '已使用'],
                    datasets: [{
                        data: [
                            data.budget_usage?.base || 0,
                            data.budget_usage?.rework || 0,
                            data.budget_usage?.used || 0
                        ],
                        backgroundColor: ['#3b82f6', '#f59e0b', '#10b981']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#888' } }
                    }
                }
            });
            
            // Agent Efficiency List
            const listEl = document.getElementById('agentEfficiencyList');
            listEl.innerHTML = (data.agent_efficiency || []).map((agent, index) => `
                <div style="display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #2a2a4a;">
                    <div style="width: 30px; font-weight: 600; color: ${index < 3 ? '#f59e0b' : '#888'};">
                        #${index + 1}
                    </div>
                    <div style="flex: 1; margin-left: 12px;">
                        <div style="font-weight: 500;">${agent.name}</div>
                        <div style="font-size: 12px; color: #666;">${agent.completed_steps} 步骤完成</div>
                    </div>
                    <div style="color: #10b981; font-weight: 600;">
                        ${agent.avg_score?.toFixed(1) || '-'} 分
                    </div>
                </div>
            `).join('');
        }
        
        // Helpers
        function getCurrentUserId() {
            // Get from auth or localStorage
            return localStorage.getItem('current_agent_id') || 'partner';
        }
        
        function getAuthToken() {
            return localStorage.getItem('auth_token') || '';
        }
        
        function openWorkflowDetail(id) {
            window.location.href = `/dashboard/workflow-detail.html?id=${id}`;
        }
        
        function useTemplate(id) {
            document.getElementById('workflow-template').value = id;
            openCreateWorkflowModal();
        }
        
        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
        
        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
