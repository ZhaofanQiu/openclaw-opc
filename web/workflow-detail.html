<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作流详情 - OpenClaw OPC</title>
    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a4a;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .back-btn:hover {
            color: #fff;
        }
        
        .workflow-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .workflow-desc {
            color: #888;
            font-size: 14px;
        }
        
        .workflow-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-pending { background: #f59e0b33; color: #f59e0b; }
        .status-progress { background: #3b82f633; color: #3b82f6; }
        .status-completed { background: #10b98133; color: #10b981; }
        .status-fused { background: #ef444433; color: #ef4444; }
        .status-rework { background: #8b5cf633; color: #8b5cf6; }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2a4a;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        /* Progress */
        .progress-section {
            margin-top: 20px;
        }
        
        .progress-bar {
            height: 8px;
            background: #2a2a4a;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            text-align: right;
        }
        
        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* Steps Timeline */
        .steps-section {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2a2a4a;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #2a2a4a;
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 24px;
        }
        
        .timeline-item:last-child {
            padding-bottom: 0;
        }
        
        .timeline-dot {
            position: absolute;
            left: -23px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2a2a4a;
            border: 3px solid #1a1a2e;
        }
        
        .timeline-item.completed .timeline-dot {
            background: #10b981;
        }
        
        .timeline-item.current .timeline-dot {
            background: #667eea;
            box-shadow: 0 0 0 4px #667eea33;
        }
        
        .timeline-item.rework .timeline-dot {
            background: #f59e0b;
        }
        
        .timeline-content {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 16px;
        }
        
        .timeline-item.current .timeline-content {
            border-color: #667eea;
        }
        
        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .step-name {
            font-size: 16px;
            font-weight: 500;
        }
        
        .step-type-badge {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .type-plan { background: #8b5cf633; color: #8b5cf6; }
        .type-execute { background: #3b82f633; color: #3b82f6; }
        .type-review { background: #f59e0b33; color: #f59e0b; }
        .type-test { background: #10b98133; color: #10b981; }
        .type-approve { background: #ef444433; color: #ef4444; }
        .type-document { background: #06b6d433; color: #06b6d4; }
        
        .step-assignee {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .assignee-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        
        .step-budget {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #666;
        }
        
        .step-budget span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .step-actions {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-success {
            background: #10b981;
            color: #fff;
        }
        
        .btn-warning {
            background: #f59e0b;
            color: #fff;
        }
        
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        
        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }
        
        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }
        
        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .sidebar-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2a4a;
        }
        
        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Action Buttons */
        .action-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .action-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-item:hover {
            border-color: #667eea;
            background: #667eea11;
        }
        
        .action-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .action-info {
            flex: 1;
        }
        
        .action-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .action-desc {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }
        
        /* History */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #0f0f1a;
            border-radius: 10px;
            font-size: 13px;
        }
        
        .history-time {
            color: #666;
            font-size: 11px;
            min-width: 60px;
        }
        
        .history-content {
            flex: 1;
        }
        
        .history-action {
            color: #fff;
            font-weight: 500;
        }
        
        .history-actor {
            color: #888;
            margin-top: 2px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
            border: 1px solid #2a2a4a;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        /* Fuse Alert */
        .fuse-alert-box {
            background: #ef444422;
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .fuse-alert-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #ef4444;
            margin-bottom: 8px;
        }
        
        .fuse-alert-desc {
            color: #888;
            font-size: 14px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        /* Result Display */
        .result-box {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 16px;
            margin-top: 12px;
        }
        
        .result-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .result-content {
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        /* Rework Badge */
        .rework-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: #f59e0b33;
            color: #f59e0b;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header" id="workflow-header">
            <!-- Dynamic content -->
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Steps Timeline -->
            <div class="steps-section">
                <div class="section-title">
                    📋 步骤进度
                </div>
                <div class="timeline" id="steps-timeline">
                    <!-- Dynamic content -->
                </div>
            </div>
            
            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Actions -->
                <div class="sidebar-card" id="actions-card">
                    <div class="sidebar-title">⚡ 可用操作</div>
                    <div class="action-list" id="action-list">
                        <!-- Dynamic content -->
                    </div>
                </div>
                
                <!-- History -->
                <div class="sidebar-card">
                    <div class="sidebar-title">📜 历史记录</div>
                    <div class="history-list" id="history-list">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Complete Step Modal -->
    <div class="modal-overlay" id="complete-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">✅ 完成任务</div>
                <button class="modal-close" onclick="closeModal('complete-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">结果描述</label>
                    <textarea class="form-textarea" id="complete-result" placeholder="描述任务完成的结果..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">实际耗时（小时）</label>
                    <input type="number" class="form-input" id="complete-hours" placeholder="4" min="0" step="0.5">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-textarea" id="complete-comment" placeholder="可选：添加备注..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('complete-modal')">取消</button>
                <button class="btn btn-success" onclick="submitComplete()">提交</button>
            </div>
        </div>
    </div>
    
    <!-- Review Step Modal -->
    <div class="modal-overlay" id="review-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">🔍 评审任务</div>
                <button class="modal-close" onclick="closeModal('review-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">评审意见</label>
                    <select class="form-select" id="review-action">
                        <option value="PASS">✅ 通过 - 进入下一步</option>
                        <option value="REWORK">↩️ 返工 - 需要修改</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">评论</label>
                    <textarea class="form-textarea" id="review-comment" placeholder="输入评审意见..."></textarea>
                </div>
                <div class="form-group" id="rework-target-group" style="display: none;">
                    <label class="form-label">返工目标步骤</label>
                    <select class="form-select" id="rework-target">
                        <!-- Dynamic options -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('review-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitReview()">提交评审</button>
            </div>
        </div>
    </div>
    
    <!-- Fuse Action Modal -->
    <div class="modal-overlay" id="fuse-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">🚨 熔断处理</div>
                <button class="modal-close" onclick="closeModal('fuse-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="fuse-alert-box">
                    <div class="fuse-alert-title">⚠️ 工作流已熔断</div>
                    <div class="fuse-alert-desc" id="fuse-reason">预算不足，无法继续返工</div>
                </div>
                <div class="form-group">
                    <label class="form-label">选择处理方式</label>
                    <select class="form-select" id="fuse-action">
                        <option value="FORCE_PASS">⚡ 强行通过 - 忽略限制继续</option>
                        <option value="ADD_BUDGET">💰 追加预算 - 增加返工预算</option>
                        <option value="RESTART">🔄 重新启动 - 从头开始</option>
                        <option value="CANCEL">🚫 取消工作流 - 终止任务</option>
                    </select>
                </div>
                <div class="form-group" id="add-budget-group" style="display: none;">
                    <label class="form-label">追加预算金额</label>
                    <input type="number" class="form-input" id="add-budget-amount" placeholder="1000" min="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('fuse-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitFuseAction()">确认</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let workflowId = null;
        let workflowData = null;
        let currentAgentId = null;
        let selectedStepId = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Get workflow ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            workflowId = urlParams.get('id');
            currentAgentId = getCurrentUserId();
            
            if (!workflowId) {
                alert('缺少工作流ID');
                window.location.href = '/dashboard';
                return;
            }
            
            loadWorkflowDetail();
            
            // Setup review action change listener
            document.getElementById('review-action').addEventListener('change', (e) => {
                const reworkGroup = document.getElementById('rework-target-group');
                reworkGroup.style.display = e.target.value === 'REWORK' ? 'block' : 'none';
            });
            
            // Setup fuse action change listener
            document.getElementById('fuse-action').addEventListener('change', (e) => {
                const budgetGroup = document.getElementById('add-budget-group');
                budgetGroup.style.display = e.target.value === 'ADD_BUDGET' ? 'block' : 'none';
            });
        });
        
        // Load Workflow Detail
        async function loadWorkflowDetail() {
            try {
                const response = await fetch(`/api/workflow-details/${workflowId}?agent_id=${currentAgentId}`);
                if (!response.ok) throw new Error('Failed to load workflow');
                
                workflowData = await response.json();
                renderWorkflow();
                renderSteps();
                renderActions();
                renderHistory();
            } catch (error) {
                console.error('Failed to load workflow:', error);
                alert('加载工作流失败');
            }
        }
        
        // Render Workflow Header
        function renderWorkflow() {
            const w = workflowData.workflow;
            const header = document.getElementById('workflow-header');
            
            const statusClass = `status-${w.status}`;
            const statusText = w.status_display;
            
            header.innerHTML = `
                <a href="/dashboard" class="back-btn">← 返回Dashboard</a>
                <div class="header-top">
                    <div>
                        <div class="workflow-title">${w.title}</div>
                        <div class="workflow-desc">${w.description || '无描述'}</div>
                    </div>
                    <span class="workflow-status ${statusClass}">${statusText}</span>
                </div>
                
                <div class="progress-section">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${w.progress}%"></div>
                    </div>
                    <div class="progress-text">${w.completed_steps}/${w.total_steps} 步骤 (${w.progress}%)</div>
                </div>
                
                <div class="stats-bar">
                    <div class="stat-item">
                        <div class="stat-value">${w.total_budget}</div>
                        <div class="stat-label">总预算 (OP)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${w.used_base_budget + w.used_rework_budget}</div>
                        <div class="stat-label">已使用 (OP)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${w.remaining_budget}</div>
                        <div class="stat-label">剩余 (OP)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${w.total_rework_count}</div>
                        <div class="stat-label">返工次数</div>
                    </div>
                </div>
            `;
        }
        
        // Render Steps Timeline
        function renderSteps() {
            const container = document.getElementById('steps-timeline');
            const steps = workflowData.steps;
            const currentIndex = workflowData.workflow.current_step_index;
            
            container.innerHTML = steps.map((step, index) => {
                const isCurrent = index === currentIndex;
                const isCompleted = step.status === 'completed';
                const isRework = step.status === 'rework';
                
                let itemClass = '';
                if (isCompleted) itemClass = 'completed';
                else if (isCurrent) itemClass = 'current';
                else if (isRework) itemClass = 'rework';
                
                const typeClass = `type-${step.step_type.toLowerCase()}`;
                
                // Build actions
                let actionsHtml = '';
                if (isCurrent && step.is_assigned_to_me) {
                    if (step.step_type === 'EXECUTE') {
                        actionsHtml = `
                            <div class="step-actions">
                                <button class="btn btn-success" onclick="openCompleteModal('${step.id}')">✅ 完成</button>
                            </div>
                        `;
                    } else if (step.step_type === 'REVIEW') {
                        actionsHtml = `
                            <div class="step-actions">
                                <button class="btn btn-primary" onclick="openReviewModal('${step.id}')">🔍 评审</button>
                            </div>
                        `;
                    }
                }
                
                // Show result if completed
                let resultHtml = '';
                if (step.status === 'completed' && step.result) {
                    const result = typeof step.result === 'string' ? step.result : JSON.stringify(step.result);
                    resultHtml = `
                        <div class="result-box">
                            <div class="result-label">完成结果</div>
                            <div class="result-content">${result.substring(0, 200)}${result.length > 200 ? '...' : ''}</div>
                        </div>
                    `;
                }
                
                // Rework badge
                let reworkBadge = '';
                if (step.rework_count > 0) {
                    reworkBadge = `<span class="rework-badge">↩️ 返工 ${step.rework_count}/${step.rework_limit}</span>`;
                }
                
                return `
                    <div class="timeline-item ${itemClass}">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="step-header">
                                <div>
                                    <div class="step-name">${step.name} ${reworkBadge}</div>
                                    <span class="step-type-badge ${typeClass}">${step.step_type_display}</span>
                                </div>
                            </div>
                            
                            <div class="step-assignee">
                                <div class="assignee-avatar">${step.assignee_name.charAt(0)}</div>
                                <span>${step.assignee_name}</span>
                                ${step.is_assigned_to_me ? '<span style="color: #667eea;">（我）</span>' : ''}
                            </div>
                            
                            <div class="step-budget">
                                <span>💰 基础: ${step.base_budget} OP</span>
                                <span>🔄 返工: ${step.rework_reserve} OP</span>
                                <span>⏱️ 预计: ${step.estimated_hours}h</span>
                            </div>
                            
                            ${resultHtml}
                            ${actionsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Render Actions
        function renderActions() {
            const actions = workflowData.available_actions || [];
            const container = document.getElementById('action-list');
            
            if (actions.length === 0) {
                document.getElementById('actions-card').style.display = 'none';
                return;
            }
            
            document.getElementById('actions-card').style.display = 'block';
            
            container.innerHTML = actions.map(action => {
                let onclick = '';
                if (action.action === 'COMPLETE') {
                    onclick = `openCompleteModal('${workflowData.current_step?.id}')`;
                } else if (action.action === 'PASS' || action.action === 'REWORK') {
                    onclick = `openReviewModal('${workflowData.current_step?.id}')`;
                } else if (action.action === 'START') {
                    onclick = 'startWorkflow()';
                } else if (['FORCE_PASS', 'ADD_BUDGET', 'RESTART', 'CANCEL'].includes(action.action)) {
                    onclick = `openFuseModal('${action.action}')`;
                } else if (action.action === 'CANCEL') {
                    onclick = 'cancelWorkflow()';
                }
                
                return `
                    <div class="action-item" onclick="${onclick}">
                        <div class="action-icon">${action.icon}</div>
                        <div class="action-info">
                            <div class="action-name">${action.label}</div>
                            <div class="action-desc">${action.description}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Render History
        function renderHistory() {
            const history = workflowData.history || [];
            const container = document.getElementById('history-list');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📜</div>
                        <div>暂无历史记录</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = history.slice(0, 10).map(h => {
                const time = new Date(h.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="history-item">
                        <div class="history-time">${time}</div>
                        <div class="history-content">
                            <div class="history-action">${h.action}</div>
                            <div class="history-actor">${h.actor_name}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Modal Functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function openCompleteModal(stepId) {
            selectedStepId = stepId;
            document.getElementById('complete-result').value = '';
            document.getElementById('complete-hours').value = '';
            document.getElementById('complete-comment').value = '';
            openModal('complete-modal');
        }
        
        function openReviewModal(stepId) {
            selectedStepId = stepId;
            document.getElementById('review-action').value = 'PASS';
            document.getElementById('review-comment').value = '';
            document.getElementById('rework-target-group').style.display = 'none';
            
            // Populate rework target options
            const steps = workflowData.steps;
            const currentIndex = steps.findIndex(s => s.id === stepId);
            const targetSelect = document.getElementById('rework-target');
            
            targetSelect.innerHTML = steps.slice(0, currentIndex)
                .filter(s => s.step_type === 'EXECUTE')
                .map(s => `<option value="${s.id}">${s.name}</option>`)
                .join('');
            
            openModal('review-modal');
        }
        
        function openFuseModal(defaultAction) {
            document.getElementById('fuse-action').value = defaultAction || 'FORCE_PASS';
            document.getElementById('add-budget-group').style.display = 'none';
            document.getElementById('add-budget-amount').value = '';
            openModal('fuse-modal');
        }
        
        // Actions
        async function submitComplete() {
            const result = document.getElementById('complete-result').value;
            const hours = document.getElementById('complete-hours').value;
            const comment = document.getElementById('complete-comment').value;
            
            if (!result) {
                alert('请输入结果描述');
                return;
            }
            
            try {
                const response = await fetch(`/api/workflow-details/step/${selectedStepId}/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agent_id: currentAgentId,
                        result: { result },
                        actual_hours: parseFloat(hours) || undefined,
                        comment
                    })
                });
                
                if (response.ok) {
                    closeModal('complete-modal');
                    loadWorkflowDetail();
                } else {
                    const error = await response.json();
                    alert(error.detail || '操作失败');
                }
            } catch (error) {
                console.error('Failed to complete step:', error);
                alert('操作失败');
            }
        }
        
        async function submitReview() {
            const action = document.getElementById('review-action').value;
            const comment = document.getElementById('review-comment').value;
            
            if (!comment) {
                alert('请输入评审意见');
                return;
            }
            
            try {
                const response = await fetch(`/api/workflow-details/step/${selectedStepId}/review`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agent_id: currentAgentId,
                        action,
                        comment,
                        review_scores: {}
                    })
                });
                
                if (response.ok) {
                    closeModal('review-modal');
                    loadWorkflowDetail();
                } else {
                    const error = await response.json();
                    alert(error.detail || '操作失败');
                }
            } catch (error) {
                console.error('Failed to review step:', error);
                alert('操作失败');
            }
        }
        
        async function submitFuseAction() {
            const action = document.getElementById('fuse-action').value;
            const budgetAmount = document.getElementById('add-budget-amount').value;
            
            if (action === 'ADD_BUDGET' && !budgetAmount) {
                alert('请输入追加预算金额');
                return;
            }
            
            try {
                const response = await fetch(`/api/workflow-details/${workflowId}/fuse-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agent_id: currentAgentId,
                        action,
                        budget_amount: action === 'ADD_BUDGET' ? parseFloat(budgetAmount) : undefined
                    })
                });
                
                if (response.ok) {
                    closeModal('fuse-modal');
                    loadWorkflowDetail();
                } else {
                    const error = await response.json();
                    alert(error.detail || '操作失败');
                }
            } catch (error) {
                console.error('Failed to handle fuse:', error);
                alert('操作失败');
            }
        }
        
        async function startWorkflow() {
            try {
                const response = await fetch(`/api/workflow-details/${workflowId}/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: currentAgentId })
                });
                
                if (response.ok) {
                    loadWorkflowDetail();
                } else {
                    const error = await response.json();
                    alert(error.detail || '启动失败');
                }
            } catch (error) {
                console.error('Failed to start workflow:', error);
                alert('启动失败');
            }
        }
        
        async function cancelWorkflow() {
            if (!confirm('确定要取消此工作流吗？')) return;
            
            try {
                const response = await fetch(`/api/workflow-details/${workflowId}/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: currentAgentId })
                });
                
                if (response.ok) {
                    loadWorkflowDetail();
                } else {
                    const error = await response.json();
                    alert(error.detail || '取消失败');
                }
            } catch (error) {
                console.error('Failed to cancel workflow:', error);
                alert('取消失败');
            }
        }
        
        // Helpers
        function getCurrentUserId() {
            return localStorage.getItem('current_agent_id') || 'partner';
        }
        
        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
