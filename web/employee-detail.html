<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工详情 | OpenClaw OPC v2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #334155;
            border: none;
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover { background: #475569; }
        .header h1 { font-size: 24px; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        
        /* API Key Input */
        .api-key-input {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 13px;
            width: 180px;
        }
        .api-key-input.saved {
            border-color: #22c55e;
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }
        
        /* Cards */
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Profile Section */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .profile-info { flex: 1; }
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .profile-id {
            font-size: 12px;
            color: #64748b;
            font-family: monospace;
        }
        .profile-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-idle { background: #22c55e20; color: #22c55e; }
        .badge-working { background: #f59e0b20; color: #f59e0b; }
        .badge-offline { background: #64748b20; color: #94a3b8; }
        .badge-level-1 { background: #64748b20; color: #94a3b8; }
        .badge-level-2 { background: #3b82f620; color: #60a5fa; }
        .badge-level-3 { background: #8b5cf620; color: #a78bfa; }
        .badge-level-4 { background: #f59e0b20; color: #f59e0b; }
        .badge-level-5 { background: #ef444420; color: #ef4444; }
        .badge-bound { background: #22c55e20; color: #22c55e; }
        .badge-unbound { background: #64748b20; color: #94a3b8; }
        
        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-label {
            font-size: 12px;
            color: #94a3b8;
        }
        .info-value {
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Budget Section */
        .budget-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }
        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .budget-mood {
            font-size: 20px;
        }
        .budget-bar {
            height: 10px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
        }
        .budget-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s;
        }
        .budget-fill.good { background: linear-gradient(90deg, #22c55e, #16a34a); }
        .budget-fill.warning { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .budget-fill.danger { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .budget-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #64748b;
        }
        
        /* Current Task */
        .task-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #0f172a;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }
        .task-card:hover { background: #1e293b; }
        .task-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .task-info { flex: 1; }
        .task-title { font-weight: 500; margin-bottom: 4px; }
        .task-meta { font-size: 12px; color: #64748b; }
        
        /* Bind Info */
        .bind-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #0f172a;
            border-radius: 8px;
        }
        .bind-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bind-details { flex: 1; }
        .bind-label { font-size: 12px; color: #64748b; }
        .bind-value { font-size: 14px; font-weight: 500; }
        
        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .task-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #0f172a;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }
        .task-list-item:hover { background: #1e293b; }
        .task-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .task-status-dot.completed { background: #22c55e; }
        .task-status-dot.pending { background: #64748b; }
        .task-status-dot.in_progress { background: #f59e0b; }
        .task-status-dot.failed { background: #ef4444; }
        .task-list-title { flex: 1; font-size: 14px; }
        .task-list-cost { font-size: 12px; color: #64748b; }
        
        /* Manual Content */
        .manual-content {
            background: #0f172a;
            border-radius: 8px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.8;
            max-height: 400px;
            overflow-y: auto;
        }
        .manual-content h1, .manual-content h2, .manual-content h3 {
            color: #60a5fa;
            margin: 16px 0 12px;
        }
        .manual-content h1 { font-size: 20px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .manual-content h2 { font-size: 16px; }
        .manual-content p { margin: 8px 0; }
        .manual-content ul, .manual-content ol { margin: 8px 0; padding-left: 20px; }
        .manual-content code {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }
        .btn-secondary:hover { background: #475569; }
        .btn-danger {
            background: #ef444420;
            color: #ef4444;
        }
        .btn-danger:hover { background: #ef444430; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            border: 1px solid #334155;
        }
        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
        }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <a href="/dashboard/employees.html" class="back-btn">← 返回员工列表</a>
                <h1 id="page-title">👤 员工详情</h1>
            </div>
            <div class="header-actions" id="header-actions">
                <input type="password" class="api-key-input" id="api-key-input" placeholder="输入 API Key..." onchange="saveApiKey()">
                <button class="btn btn-secondary" onclick="openEditModal()">✏️ 编辑</button>
                <button class="btn btn-danger" onclick="deleteAgent()">🗑️ 删除</button>
            </div>
        </div>
        
        <div class="main-grid">
            <!-- Left Column -->
            <div class="left-column">
                <!-- Profile Card -->
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profile-emoji">🤖</div>
                        <div class="profile-info">
                            <div class="profile-name" id="profile-name">加载中...</div>
                            <div class="profile-id" id="profile-id">-</div>
                            <div class="profile-status">
                                <span id="profile-status-badge"></span>
                                <span id="profile-level-badge"></span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">创建时间</span>
                            <span class="info-value" id="info-created">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">已完成任务</span>
                            <span class="info-value" id="info-completed">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">月度预算</span>
                            <span class="info-value" id="info-budget">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">剩余预算</span>
                            <span class="info-value" id="info-remaining">-</span>
                        </div>
                    </div>
                    
                    <div class="budget-section">
                        <div class="budget-header">
                            <span class="info-label">预算使用情况</span>
                            <span class="budget-mood" id="budget-mood">😊</span>
                        </div>
                        <div class="budget-bar">
                            <div class="budget-fill good" id="budget-fill" style="width: 100%"></div>
                        </div>
                        <div class="budget-stats">
                            <span id="budget-used">已用: 0 OC币</span>
                            <span id="budget-percentage">剩余: 100%</span>
                        </div>
                    </div>
                </div>
                
                <!-- Task History -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📋 任务历史</h2>
                        <a href="/dashboard/tasks.html" class="btn btn-secondary btn-sm">查看全部</a>
                    </div>
                    <div class="task-list" id="task-history">
                        <div class="loading">
                            <div class="spinner"></div>
                            加载中...
                        </div>
                    </div>
                </div>
                
                <!-- Manual -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📖 员工手册</h2>
                        <a href="#" id="manual-link" target="_blank" class="btn btn-secondary btn-sm" style="display: none;">查看文件</a>
                    </div>
                    <div class="manual-content" id="manual-content">
                        <div class="loading">
                            <div class="spinner"></div>
                            加载手册内容...
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Column -->
            <div class="right-column">
                <!-- Current Task -->
                <div class="card" id="current-task-card" style="display: none;">
                    <div class="card-header">
                        <h2 class="card-title">▶️ 当前任务</h2>
                    </div>
                    <a href="#" id="current-task-link" class="task-card">
                        <div class="task-icon">📋</div>
                        <div class="task-info">
                            <div class="task-title" id="current-task-title">-</div>
                            <div class="task-meta" id="current-task-meta">-</div>
                        </div>
                    </a>
                </div>
                
                <!-- Binding Status -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">🔗 OpenClaw 绑定</h2>
                    </div>
                    <div class="bind-info" id="bind-info">
                        <div class="bind-icon">🔗</div>
                        <div class="bind-details">
                            <div class="bind-label">绑定状态</div>
                            <div class="bind-value" id="bind-status">未绑定</div>
                        </div>
                        <span id="bind-badge"></span>
                    </div>
                    <div id="bind-actions" style="margin-top: 16px; display: none;">
                        <button class="btn btn-primary" style="width: 100%;" onclick="openBindModal()">绑定 Agent</button>
                    </div>
                </div>
                
                <!-- Actions -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">⚡ 操作</h2>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <button class="btn btn-primary" onclick="createTaskForAgent()">➕ 创建任务</button>
                        <button class="btn btn-secondary" onclick="viewAgentLogs()">📋 查看交互日志</button>
                        <button class="btn btn-secondary" onclick="openEditModal()">✏️ 编辑员工</button>
                        <button class="btn btn-danger" onclick="deleteAgent()">🗑️ 删除员工</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">编辑员工</div>
            <form id="edit-form">
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" name="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Emoji</label>
                    <input type="text" class="form-input" name="emoji" maxlength="2">
                </div>
                <div class="form-group">
                    <label class="form-label">月度预算 (OC币)</label>
                    <input type="number" class="form-input" name="monthly_budget" min="0" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Bind Modal -->
    <div class="modal-overlay" id="bind-modal">
        <div class="modal">
            <div class="modal-header">绑定 OpenClaw Agent</div>
            <form id="bind-form">
                <div class="form-group">
                    <label class="form-label">OpenClaw Agent ID</label>
                    <input type="text" class="form-input" name="openclaw_agent_id" placeholder="如: opc_helper" required>
                    <p style="font-size: 12px; color: #64748b; margin-top: 8px;">必须以 opc_ 开头</p>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeBindModal()">取消</button>
                    <button type="submit" class="btn btn-primary">绑定</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="toast-container" id="toast-container"></div>

    <script>
        const API_BASE = '/api';
        
        // API Key 管理
        let API_KEY = localStorage.getItem('opc_api_key') || '';
        
        function getApiKey() {
            return API_KEY;
        }
        
        function setApiKey(key) {
            API_KEY = key;
            localStorage.setItem('opc_api_key', key);
        }
        
        // 保存 API Key
        function saveApiKey() {
            const input = document.getElementById('api-key-input');
            const key = input.value.trim();
            if (key) {
                setApiKey(key);
                input.classList.add('saved');
                showToast('API Key 已保存，重新加载数据...');
                loadAgentData();
            }
        }
        
        // 初始化 API Key 输入框
        function initApiKey() {
            const savedKey = getApiKey();
            if (savedKey) {
                const input = document.getElementById('api-key-input');
                input.value = savedKey;
                input.classList.add('saved');
            }
        }
        
        // 带认证的 fetch 封装
        async function authFetch(url, options = {}) {
            const key = getApiKey();
            const separator = url.includes('?') ? '&' : '?';
            const authUrl = key ? `${url}${separator}api_key=${key}` : url;
            return fetch(authUrl, options);
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const agentId = urlParams.get('id');
        
        if (!agentId) {
            showToast('错误：未指定员工ID', 'error');
            setTimeout(() => window.location.href = '/dashboard/employees.html', 2000);
        }
        
        let agentData = null;
        
        function showToast(msg, type='success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function getStatusBadge(status) {
            const badges = {
                'idle': '<span class="badge badge-idle">空闲</span>',
                'working': '<span class="badge badge-working">工作中</span>',
                'offline': '<span class="badge badge-offline">离线</span>'
            };
            return badges[status] || `<span class="badge">${status}</span>`;
        }
        
        function getLevelBadge(level) {
            const labels = { 1: '实习生', 2: '专员', 3: '资深', 4: '专家', 5: '合伙人' };
            return `<span class="badge badge-level-${level}">${labels[level] || level}</span>`;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', { 
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
        }
        
        function formatCurrency(amount) {
            return amount.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        
        function getStatusDot(status) {
            const classes = {
                'completed': 'completed',
                'pending': 'pending',
                'assigned': 'pending',
                'in_progress': 'in_progress',
                'failed': 'failed'
            };
            return `<span class="task-status-dot ${classes[status] || 'pending'}"></span>`;
        }
        
        async function loadAgent() {
            try {
                const res = await authFetch(`${API_BASE}/agents/${agentId}`);
                if (!res.ok) throw new Error('Agent not found');
                
                agentData = await res.json();
                
                // Update page
                document.title = `${agentData.name} | OpenClaw OPC`;
                document.getElementById('page-title').textContent = `👤 ${agentData.name}`;
                
                // Profile
                document.getElementById('profile-emoji').textContent = agentData.emoji || '🤖';
                document.getElementById('profile-name').textContent = agentData.name;
                document.getElementById('profile-id').textContent = agentData.id;
                document.getElementById('profile-status-badge').innerHTML = getStatusBadge(agentData.status);
                document.getElementById('profile-level-badge').innerHTML = getLevelBadge(agentData.position_level);
                
                // Info
                document.getElementById('info-created').textContent = formatDate(agentData.created_at);
                document.getElementById('info-completed').textContent = agentData.completed_tasks || 0;
                document.getElementById('info-budget').textContent = formatCurrency(agentData.monthly_budget) + ' OC币';
                document.getElementById('info-remaining').textContent = formatCurrency(agentData.remaining_budget) + ' OC币';
                
                // Budget bar
                const used = agentData.used_budget || 0;
                const total = agentData.monthly_budget || 1;
                const remaining = agentData.remaining_budget || 0;
                const percentage = (remaining / total) * 100;
                
                document.getElementById('budget-mood').textContent = agentData.mood || '😊';
                document.getElementById('budget-fill').style.width = `${percentage}%`;
                document.getElementById('budget-fill').className = 'budget-fill ' + 
                    (percentage > 60 ? 'good' : percentage > 30 ? 'warning' : 'danger');
                document.getElementById('budget-used').textContent = `已用: ${formatCurrency(used)} OC币`;
                document.getElementById('budget-percentage').textContent = `剩余: ${percentage.toFixed(1)}%`;
                
                // Binding
                const isBound = agentData.openclaw_agent_id;
                document.getElementById('bind-status').textContent = isBound ? agentData.openclaw_agent_id : '未绑定';
                document.getElementById('bind-badge').innerHTML = isBound ? 
                    '<span class="badge badge-bound">已绑定</span>' : 
                    '<span class="badge badge-unbound">未绑定</span>';
                
                if (!isBound) {
                    document.getElementById('bind-actions').style.display = 'block';
                }
                
                // Current task
                if (agentData.current_task_id && agentData.status === 'working') {
                    loadCurrentTask(agentData.current_task_id);
                }
                
                // Task history
                loadTaskHistory();
                
                // Manual
                loadManual();
                
            } catch (error) {
                console.error('Failed to load agent:', error);
                showToast('加载员工信息失败', 'error');
            }
        }
        
        async function loadCurrentTask(taskId) {
            try {
                const res = await authFetch(`${API_BASE}/tasks/${taskId}`);
                if (!res.ok) return;
                
                const task = await res.json();
                document.getElementById('current-task-card').style.display = 'block';
                document.getElementById('current-task-title').textContent = task.title;
                document.getElementById('current-task-meta').textContent = `${task.priority} · ${task.estimated_cost} OC币`;
                document.getElementById('current-task-link').href = `/dashboard/task-detail.html?id=${taskId}`;
            } catch (error) {
                console.error('Failed to load current task:', error);
            }
        }
        
        async function loadTaskHistory() {
            try {
                // Get all tasks and filter by assigned_to
                const res = await authFetch(`${API_BASE}/tasks`);
                if (!res.ok) return;
                
                const data = await res.json();
                const tasks = (data.tasks || []).filter(t => t.assigned_to === agentId);
                
                const container = document.getElementById('task-history');
                
                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <div>暂无任务记录</div>
                        </div>
                    `;
                    return;
                }
                
                // Sort by created_at desc, take first 5
                const recentTasks = tasks
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                    .slice(0, 5);
                
                container.innerHTML = recentTasks.map(task => `
                    <a href="/dashboard/task-detail.html?id=${task.id}" class="task-list-item">
                        ${getStatusDot(task.status)}
                        <span class="task-list-title">${task.title}</span>
                        <span class="task-list-cost">${task.actual_cost?.toFixed?.(2) || 0} OC币</span>
                    </a>
                `).join('');
                
            } catch (error) {
                console.error('Failed to load task history:', error);
                document.getElementById('task-history').innerHTML = `
                    <div class="empty-state">加载失败</div>
                `;
            }
        }
        
        async function loadManual() {
            try {
                const res = await authFetch(`${API_BASE}/manuals/employee/${agentId}`);
                if (!res.ok) throw new Error('Manual not found');
                
                const manual = await res.json();
                document.getElementById('manual-content').innerHTML = markdownToHtml(manual.content);
                document.getElementById('manual-link').href = manual.path;
                document.getElementById('manual-link').style.display = 'inline-flex';
            } catch (error) {
                document.getElementById('manual-content').innerHTML = `
                    <div class="empty-state">手册尚未生成</div>
                `;
            }
        }
        
        // Modal functions
        function openEditModal() {
            if (!agentData) return;
            
            document.querySelector('#edit-form [name="name"]').value = agentData.name;
            document.querySelector('#edit-form [name="emoji"]').value = agentData.emoji || '🤖';
            document.querySelector('#edit-form [name="monthly_budget"]').value = agentData.monthly_budget;
            
            document.getElementById('edit-modal').classList.add('active');
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }
        
        function openBindModal() {
            document.getElementById('bind-modal').classList.add('active');
        }
        
        function closeBindModal() {
            document.getElementById('bind-modal').classList.remove('active');
        }
        
        // Form handlers
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.monthly_budget = parseFloat(data.monthly_budget);
            
            try {
                const res = await authFetch(`${API_BASE}/agents/${agentId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast('员工信息已更新');
                    closeEditModal();
                    loadAgent();
                } else {
                    const err = await res.json();
                    showToast(err.detail || '更新失败', 'error');
                }
            } catch (error) {
                showToast('更新失败', 'error');
            }
        });
        
        document.getElementById('bind-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const res = await authFetch(`${API_BASE}/agents/${agentId}/bind`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast('绑定成功');
                    closeBindModal();
                    loadAgent();
                } else {
                    const err = await res.json();
                    showToast(err.detail || '绑定失败', 'error');
                }
            } catch (error) {
                showToast('绑定失败', 'error');
            }
        });
        
        // Action handlers
        function createTaskForAgent() {
            window.location.href = `/dashboard/tasks.html?create_for=${agentId}`;
        }
        
        function viewAgentLogs() {
            const agentName = agentData?.name || agentId;
            window.location.href = `/dashboard/agent-logs.html?agent=${agentId}`;
        }
        
        async function deleteAgent() {
            if (!confirm('确定要删除此员工吗？此操作不可恢复。')) return;
            
            try {
                const res = await authFetch(`${API_BASE}/agents/${agentId}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('员工已删除');
                    setTimeout(() => window.location.href = '/dashboard/employees.html', 1500);
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }
        
        // Markdown to HTML
        function markdownToHtml(md) {
            if (!md) return '';
            return md
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/\n/gim, '<br>');
        }
        
        // Initialize
        initApiKey();  // 初始化 API Key
        loadAgent();
    </script>
</body>
</html>
