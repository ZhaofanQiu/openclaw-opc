<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作日报 - 星际工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 4px solid #2a2a4a;
        }

        h1 {
            font-size: 24px;
            color: #667eea;
            text-shadow: 2px 2px 0 #2a2a4a;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 12px;
            color: #888;
        }

        .nav-links {
            margin-top: 15px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
            font-size: 12px;
        }

        /* Report Card */
        .report-card {
            background: #252542;
            border: 4px solid #2a2a4a;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #2a2a4a;
        }

        .report-date {
            font-size: 18px;
            color: #667eea;
        }

        .report-badge {
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 4px;
            font-size: 12px;
            color: #667eea;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 700px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: #1a1a2e;
            border-radius: 8px;
            border: 2px solid #2a2a4a;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
        }

        /* Agent Performance */
        .section-title {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #1a1a2e;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            background: #2a2a4a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-size: 14px;
            font-weight: bold;
        }

        .agent-meta {
            font-size: 11px;
            color: #888;
        }

        .agent-stats {
            text-align: right;
        }

        .agent-tasks {
            font-size: 16px;
            font-weight: bold;
            color: #4ade80;
        }

        .agent-cost {
            font-size: 11px;
            color: #fbbf24;
        }

        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #1a1a2e;
            border-radius: 6px;
            border-left: 4px solid #4ade80;
        }

        .task-icon {
            font-size: 18px;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 13px;
            margin-bottom: 2px;
        }

        .task-assignee {
            font-size: 11px;
            color: #888;
        }

        .task-cost {
            font-size: 13px;
            color: #fbbf24;
            font-weight: bold;
        }

        /* Date Selector */
        .date-selector {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .date-input {
            padding: 8px 12px;
            background: #1a1a2e;
            border: 2px solid #2a2a4a;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            background: #667eea;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        .btn:hover {
            background: #7b8eea;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a4a;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Quick Links */
        .quick-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .quick-link {
            padding: 8px 16px;
            background: #252542;
            border: 2px solid #2a2a4a;
            border-radius: 4px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-link:hover, .quick-link.active {
            border-color: #667eea;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 工作日报</h1>
            <p class="subtitle">查看每日工作汇总与团队表现</p>
            <div class="nav-links">
                <a href="/dashboard">← 返回Dashboard</a>
                <a href="/dashboard/pixel-office.html">🏢 像素办公室</a>
            </div>
        </header>

        <!-- Date Selector -->
        <div class="date-selector">
            <input type="date" class="date-input" id="date-input">
            <button class="btn" onclick="loadReport()">查看日报</button>
        </div>

        <!-- Quick Links -->
        <div class="quick-links">
            <button class="quick-link" onclick="loadYesterday()">昨天</button>
            <button class="quick-link" onclick="loadRecent()">最近7天</button>
        </div>

        <!-- Report Container -->
        <div id="report-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载日报...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080'
            : '';

        // Set default date to yesterday
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        document.getElementById('date-input').value = yesterday.toISOString().split('T')[0];

        // Load report for a specific date
        async function loadReport(dateStr) {
            const container = document.getElementById('report-container');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载日报...</p>
                </div>
            `;

            if (!dateStr) {
                dateStr = document.getElementById('date-input').value;
            }

            try {
                const response = await fetch(`${API_BASE}/api/reports/daily?date_str=${dateStr}`);
                if (!response.ok) {
                    throw new Error('Failed to load report');
                }

                const report = await response.json();
                renderReport(report);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>暂无数据</p>
                        <p style="font-size: 12px; color: #666; margin-top: 8px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load yesterday's report
        function loadYesterday() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const dateStr = yesterday.toISOString().split('T')[0];
            document.getElementById('date-input').value = dateStr;
            loadReport(dateStr);
        }

        // Load recent reports
        async function loadRecent() {
            const container = document.getElementById('report-container');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载最近7天...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/api/reports/recent?days=7`);
                if (!response.ok) {
                    throw new Error('Failed to load reports');
                }

                const data = await response.json();
                renderRecentReports(data);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>加载失败</p>
                    </div>
                `;
            }
        }

        // Render single report
        function renderReport(report) {
            const container = document.getElementById('report-container');
            const summary = report.summary;

            container.innerHTML = `
                <div class="report-card">
                    <div class="report-header">
                        <div class="report-date">📅 ${report.date}</div>
                        <div class="report-badge">日报</div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${summary.total_tasks_completed}</div>
                            <div class="stat-label">完成任务</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${Math.round(summary.total_budget_consumed)}</div>
                            <div class="stat-label">消耗OC币</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${summary.tasks_created}</div>
                            <div class="stat-label">新建任务</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${summary.completion_rate}%</div>
                            <div class="stat-label">完成率</div>
                        </div>
                    </div>

                    ${report.agent_performance.length > 0 ? `
                        <div class="section-title">👥 员工表现</div>
                        <div class="agent-list">
                            ${report.agent_performance.map(agent => `
                                <div class="agent-item">
                                    <div class="agent-avatar">${agent.emoji}</div>
                                    <div class="agent-info">
                                        <div class="agent-name">${agent.name}</div>
                                        <div class="agent-meta">完成 ${agent.tasks_completed} 个任务</div>
                                    </div>
                                    <div class="agent-stats">
                                        <div class="agent-tasks">${agent.tasks_completed}</div>
                                        <div class="agent-cost">💰 ${Math.round(agent.budget_consumed)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    ${report.completed_tasks.length > 0 ? `
                        <div class="section-title">✅ 完成任务列表</div>
                        <div class="task-list">
                            ${report.completed_tasks.map(task => `
                                <div class="task-item">
                                    <div class="task-icon">✓</div>
                                    <div class="task-info">
                                        <div class="task-title">${task.title}</div>
                                        <div class="task-assignee">执行人: ${task.agent_name}</div>
                                    </div>
                                    <div class="task-cost">${Math.round(task.actual_cost)} OC</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="empty-state">
                            <div class="empty-icon">😴</div>
                            <p>今天没有完成任务</p>
                        </div>
                    `}
                </div>
            `;
        }

        // Render recent reports summary
        function renderRecentReports(data) {
            const container = document.getElementById('report-container');
            const reports = data.reports;

            // Calculate totals
            let totalTasks = 0;
            let totalBudget = 0;
            reports.forEach(r => {
                totalTasks += r.summary.total_tasks_completed;
                totalBudget += r.summary.total_budget_consumed;
            });

            container.innerHTML = `
                <div class="report-card">
                    <div class="report-header">
                        <div class="report-date">📈 最近7天汇总</div>
                        <div class="report-badge">周报</div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${totalTasks}</div>
                            <div class="stat-label">总任务</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${Math.round(totalBudget)}</div>
                            <div class="stat-label">总消耗OC币</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${Math.round(totalBudget / 7)}</div>
                            <div class="stat-label">日均消耗</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${reports.length}</div>
                            <div class="stat-label">统计天数</div>
                        </div>
                    </div>

                    <div class="section-title">📅 每日详情</div>
                    <div class="agent-list">
                        ${reports.map(r => `
                            <div class="agent-item" style="cursor: pointer;" onclick="loadReport('${r.date}')">
                                <div class="agent-info">
                                    <div class="agent-name">${r.date}</div>
                                    <div class="agent-meta">完成任务: ${r.summary.total_tasks_completed} | 新建: ${r.summary.tasks_created}</div>
                                </div>
                                <div class="agent-stats">
                                    <div class="agent-cost">💰 ${Math.round(r.summary.total_budget_consumed)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Load initial report
        loadReport();
    </script>
</body>
</html>
